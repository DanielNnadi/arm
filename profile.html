<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMORAI — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(circle at 20% 30%, #0a0f1e, #010101);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #eef2ff;
    position: relative;
    min-height: 100vh;
  }
  /* Animated grid background (same as dashboard) */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1; }
  .orb1 { width: 500px; height: 500px; background: #00d4ff; top: -200px; left: -200px; }
  .orb2 { width: 600px; height: 600px; background: #7a2be0; bottom: -300px; right: -200px; }

  /* Navigation */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: rgba(2, 6, 20, 0.75);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(0,212,255,0.2);
  }
  .nav-logo { font-size: 28px; font-weight: 800; font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #fff, #0ff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-links a, .logout-btn { font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #ccd6f6; text-decoration: none; background: none; border: none; cursor: pointer; }
  .nav-links a:hover, .logout-btn:hover { color: #0ff; text-shadow: 0 0 5px #0ff; }

  /* Profile container */
  .profile-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 140px 60px 80px;
    position: relative;
    z-index: 10;
  }
  .glass-card {
    background: rgba(10, 18, 30, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 32px;
    padding: 32px;
    margin-bottom: 32px;
    transition: all 0.3s;
  }
  .glass-card:hover {
    border-color: #0ff;
    box-shadow: 0 0 20px rgba(0,255,255,0.1);
  }
  .profile-header {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .avatar-wrapper {
    text-align: center;
  }
  .avatar {
    font-size: 80px;
    background: rgba(0,212,255,0.1);
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 60px;
    border: 2px solid rgba(0,212,255,0.3);
    transition: 0.2s;
    cursor: pointer;
  }
  .avatar:hover {
    border-color: #0ff;
    transform: scale(1.02);
  }
  .avatar-selector {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .avatar-option {
    font-size: 28px;
    padding: 6px;
    cursor: pointer;
    border-radius: 50%;
    transition: 0.2s;
    background: rgba(0,212,255,0.1);
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-option:hover, .avatar-option.selected {
    background: rgba(0,212,255,0.3);
    border: 1px solid #0ff;
    transform: scale(1.05);
  }
  .info-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .info-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .info-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #8ea3c2;
    text-transform: uppercase;
  }
  .info-value {
    font-size: 16px;
    font-weight: 500;
    background: rgba(0,0,0,0.3);
    padding: 8px 12px;
    border-radius: 16px;
    border: 1px solid rgba(0,212,255,0.2);
  }
  .info-value span {
    color: #0ff;
    cursor: pointer;
    margin-left: 8px;
    font-size: 12px;
  }
  .skills-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .skill-tag {
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 40px;
    padding: 4px 12px;
    font-size: 12px;
  }
  .edit-input {
    width: 100%;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 16px;
    padding: 8px 12px;
    color: #eef2ff;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .btn-glow {
    background: linear-gradient(90deg, #0ff, #7a2be0);
    border: none;
    padding: 10px 24px;
    border-radius: 40px;
    font-weight: 600;
    color: #010101;
    cursor: pointer;
    font-size: 13px;
    margin-top: 16px;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid #0ff;
    color: #0ff;
    margin-left: 12px;
  }
  .save-message {
    margin-top: 12px;
    font-size: 12px;
    color: #00ff88;
  }
  footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid rgba(0,212,255,0.1);
    margin-top: 40px;
    font-size: 12px;
    color: #6c86a3;
  }
  @media (max-width: 700px) {
    nav { padding: 16px 24px; }
    .profile-container { padding: 100px 24px 60px; }
    .profile-header { flex-direction: column; text-align: center; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>

<nav>
  <a href="index.html" class="nav-logo">ARMORAI</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="certifications.html">Certifications</a>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</nav>

<div class="profile-container">
  <div class="glass-card" id="profileCard">
    <div class="profile-header">
      <!-- Avatar Section -->
      <div class="avatar-wrapper">
        <div id="avatarDisplay" class="avatar">👤</div>
        <div id="avatarSelector" class="avatar-selector" style="display: none;">
          <div class="avatar-option" data-avatar="👤">👤</div>
          <div class="avatar-option" data-avatar="🛡️">🛡️</div>
          <div class="avatar-option" data-avatar="🤖">🤖</div>
          <div class="avatar-option" data-avatar="🧑‍💻">🧑‍💻</div>
          <div class="avatar-option" data-avatar="👩‍🚀">👩‍🚀</div>
          <div class="avatar-option" data-avatar="🦸">🦸</div>
          <div class="avatar-option" data-avatar="🐱‍👤">🐱‍👤</div>
          <div class="avatar-option" data-avatar="⚡">⚡</div>
        </div>
        <button id="changeAvatarBtn" class="btn-outline btn-glow" style="margin-top: 8px;">Change Avatar</button>
      </div>

      <!-- Editable Info Fields -->
      <div class="info-grid" id="infoGrid">
        <div class="info-field"><span class="info-label">First Name</span><div class="info-value" data-field="firstName"></div></div>
        <div class="info-field"><span class="info-label">Last Name</span><div class="info-value" data-field="lastName"></div></div>
        <div class="info-field"><span class="info-label">Age</span><div class="info-value" data-field="age"></div></div>
        <div class="info-field"><span class="info-label">Occupation</span><div class="info-value" data-field="occupation"><span class="edit-icon">✏️</span></div></div>
        <div class="info-field" style="grid-column: span 2;"><span class="info-label">Skills</span><div class="info-value" data-field="skills"><span class="edit-icon">✏️</span></div></div>
      </div>
    </div>

    <div style="margin-top: 24px;">
      <button id="saveProfileBtn" class="btn-glow">Save Profile</button>
      <div id="saveMessage" class="save-message"></div>
    </div>
  </div>
</div>

<footer>© 2026 ArmorAI — Profile & Achievements</footer>

<script>
  // Auth
  const currentUser = localStorage.getItem('armorai_current_user');
  if (!currentUser) window.location.href = 'login.html';
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem('armorai_current_user');
    window.location.href = 'login.html';
  };

  // Load user data from localStorage
  let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
  let userData = users[currentUser] || {};
  // Initialize profile extras if not exist
  if (!userData.occupation) userData.occupation = '';
  if (!userData.skills) userData.skills = [];
  if (!userData.avatar) userData.avatar = '👤';

  // Helper to save user data
  function saveUserData() {
    users[currentUser] = userData;
    localStorage.setItem('armorai_users', JSON.stringify(users));
  }

  // Render profile
  function renderProfile() {
    // Basic info
    document.querySelector('[data-field="firstName"]').innerHTML = userData.firstName || '';
    document.querySelector('[data-field="lastName"]').innerHTML = userData.lastName || '';
    document.querySelector('[data-field="age"]').innerHTML = userData.age || '';
    // Occupation
    const occDiv = document.querySelector('[data-field="occupation"]');
    occDiv.innerHTML = (userData.occupation || 'Not set') + ' <span class="edit-icon">✏️</span>';
    // Skills
    const skillsDiv = document.querySelector('[data-field="skills"]');
    if (userData.skills && userData.skills.length) {
      let skillsHtml = `<div class="skills-list">${userData.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div> <span class="edit-icon">✏️</span>`;
      skillsDiv.innerHTML = skillsHtml;
    } else {
      skillsDiv.innerHTML = 'Add your skills ✏️';
    }
    // Avatar
    document.getElementById('avatarDisplay').innerText = userData.avatar;
  }

  // Edit modals – inline editing
  let activeEditField = null;

  function startEdit(field) {
    if (activeEditField) return;
    activeEditField = field;
    let currentValue = '';
    let inputType = 'text';
    if (field === 'occupation') {
      currentValue = userData.occupation || '';
    } else if (field === 'skills') {
      currentValue = (userData.skills || []).join(', ');
    } else {
      return;
    }
    const container = document.querySelector(`[data-field="${field}"]`);
    const originalHtml = container.innerHTML;
    const inputHtml = `<input type="text" id="editInput" class="edit-input" value="${escapeHtml(currentValue)}" placeholder="Enter ${field}"> <button id="saveEditBtn" class="btn-outline" style="padding: 4px 12px;">Save</button> <button id="cancelEditBtn" class="btn-outline" style="padding: 4px 12px;">Cancel</button>`;
    container.innerHTML = inputHtml;
    document.getElementById('saveEditBtn').onclick = () => {
      const newValue = document.getElementById('editInput').value.trim();
      if (field === 'occupation') {
        userData.occupation = newValue;
      } else if (field === 'skills') {
        userData.skills = newValue.split(',').map(s => s.trim()).filter(s => s);
      }
      saveUserData();
      renderProfile();
      activeEditField = null;
    };
    document.getElementById('cancelEditBtn').onclick = () => {
      container.innerHTML = originalHtml;
      activeEditField = null;
    };
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Attach edit listeners (delegation)
  document.getElementById('infoGrid').addEventListener('click', (e) => {
    const target = e.target.closest('[data-field]');
    if (target && target.classList.contains('info-value')) {
      const field = target.getAttribute('data-field');
      if (field === 'occupation' || field === 'skills') {
        startEdit(field);
      }
    }
  });

  // Avatar selection
  const avatarSelector = document.getElementById('avatarSelector');
  const changeAvatarBtn = document.getElementById('changeAvatarBtn');
  changeAvatarBtn.onclick = () => {
    if (avatarSelector.style.display === 'flex') {
      avatarSelector.style.display = 'none';
    } else {
      avatarSelector.style.display = 'flex';
    }
  };
  document.querySelectorAll('.avatar-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const newAvatar = opt.getAttribute('data-avatar');
      userData.avatar = newAvatar;
      saveUserData();
      renderProfile();
      avatarSelector.style.display = 'none';
      // Show temporary save message
      document.getElementById('saveMessage').innerText = 'Avatar updated!';
      setTimeout(() => document.getElementById('saveMessage').innerText = '', 2000);
    });
  });

  // Save all profile changes (already handled per-field, but a global save button can also sync)
  document.getElementById('saveProfileBtn').onclick = () => {
    saveUserData();
    renderProfile();
    document.getElementById('saveMessage').innerText = 'Profile saved successfully!';
    setTimeout(() => document.getElementById('saveMessage').innerText = '', 2000);
  };

  renderProfile();
</script>
</body>
</html>
