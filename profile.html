<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMORAI — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020406;
    color: #c8dce8;
    font-family: 'DM Sans', sans-serif;
  }
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    background: #020406dd;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 6px; color: #e8f4ff; text-decoration: none; }
  .nav-logo span { color: #00d4ff; }
  .nav-links a, .logout-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #4a6478;
    text-decoration: none;
    margin-left: 30px;
    background: none;
    border: none;
    cursor: pointer;
  }
  .profile-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 140px 60px 60px;
  }
  .card {
    background: #0d1e2e;
    border: 1px solid #0f2d45;
    padding: 32px;
    margin-bottom: 30px;
  }
  footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid #0f2d45;
  }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">ARMOR<span>AI</span></a>
  <div>
    <a href="dashboard.html" class="nav-links">Dashboard</a>
    <a href="profile.html" class="nav-links">Profile</a>
    <a href="certifications.html" class="nav-links">Certifications</a>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</nav>

<div class="profile-container">
  <div class="card">
    <h2>User Profile</h2>
    <p><strong>Email:</strong> <span id="profileEmail"></span></p>
    <p><strong>Member since:</strong> <span id="memberSince"></span></p>
  </div>
</div>

<footer>© 2026 ArmorAI</footer>

<script>
  const currentUser = localStorage.getItem('armorai_current_user');
  if (!currentUser) window.location.href = 'login.html';
  document.getElementById('profileEmail').innerText = currentUser;
  const joinDate = localStorage.getItem('armorai_join_date');
  if (!joinDate) {
    const today = new Date().toISOString().split('T')[0];
    localStorage.setItem('armorai_join_date', today);
    document.getElementById('memberSince').innerText = today;
  } else {
    document.getElementById('memberSince').innerText = joinDate;
  }
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem('armorai_current_user');
    window.location.href = 'login.html';
  };
</script>
</body>
</html>
