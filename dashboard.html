<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMORAI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020406;
    color: #c8dce8;
    font-family: 'DM Sans', sans-serif;
  }
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    background: #020406dd;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 6px; color: #e8f4ff; text-decoration: none; }
  .nav-logo span { color: #00d4ff; }
  .nav-links a, .logout-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #4a6478;
    text-decoration: none;
    margin-left: 30px;
    background: none;
    border: none;
    cursor: pointer;
  }
  .nav-links a:hover, .logout-btn:hover { color: #00d4ff; }
  .dashboard-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 60px 60px;
  }
  .card {
    background: #0d1e2e;
    border: 1px solid #0f2d45;
    padding: 28px;
    margin-bottom: 30px;
  }
  .btn-primary {
    font-family: 'Share Tech Mono', monospace;
    background: #00d4ff;
    color: #020406;
    padding: 12px 24px;
    text-decoration: none;
    display: inline-block;
    margin-top: 16px;
  }
  footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid #0f2d45;
  }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">ARMOR<span>AI</span></a>
  <div>
    <a href="dashboard.html" class="nav-links">Dashboard</a>
    <a href="profile.html" class="nav-links">Profile</a>
    <a href="certifications.html" class="nav-links">Certifications</a>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</nav>

<div class="dashboard-container">
  <div class="card">
    <h2>Welcome, <span id="userEmail"></span></h2>
    <p>You are now logged into ArmorAI Command Center.</p>
  </div>
  <div class="card">
    <h3>🎓 Job Simulations</h3>
    <p>Test your skills with real-world tech assessments. Earn verifiable certificates.</p>
    <a href="certifications.html" class="btn-primary">Start a Job Simulation →</a>
  </div>
</div>

<footer>© 2026 ArmorAI — Autonomous Cyber Defense</footer>

<script>
  const currentUser = localStorage.getItem('armorai_current_user');
  if (!currentUser) window.location.href = 'login.html';
  document.getElementById('userEmail').innerText = currentUser;
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem('armorai_current_user');
    window.location.href = 'login.html';
  };
</script>
</body>
</html>
