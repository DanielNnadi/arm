<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMORAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020406;
    color: #c8dce8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-container {
    background: rgba(5,11,16,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid #00d4ff;
    padding: 48px;
    width: 90%;
    max-width: 480px;
    text-align: center;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 6px; color: #e8f4ff; }
  .logo span { color: #00d4ff; }
  .tab-buttons { display: flex; margin: 32px 0; border-bottom: 1px solid #0f2d45; }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #4a6478;
    cursor: pointer;
  }
  .tab-btn.active { color: #00d4ff; border-bottom: 2px solid #00d4ff; }
  .form-group { margin-bottom: 24px; }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(0,212,255,0.03);
    border: 1px solid #0f2d45;
    color: #c8dce8;
    font-size: 14px;
  }
  .btn-primary {
    width: 100%;
    font-family: 'Share Tech Mono', monospace;
    background: #00d4ff;
    color: #020406;
    border: none;
    padding: 14px;
    cursor: pointer;
    margin-top: 8px;
  }
  .small-link {
    color: #00d4ff;
    font-size: 11px;
    text-decoration: underline;
    cursor: pointer;
    display: inline-block;
    margin-top: 16px;
  }
  .error { color: #ff8888; margin-top: 8px; }
  .success { color: #00ff88; margin-top: 8px; }
  .back-link { margin-top: 24px; }
  .back-link a { color: #4a6478; font-size: 10px; text-decoration: none; }
</style>
</head>
<body>
<div class="auth-container">
  <div class="logo">ARMOR<span>AI</span></div>
  <div class="tab-buttons">
    <button class="tab-btn active" id="loginTab">Login</button>
    <button class="tab-btn" id="registerTab">Register</button>
  </div>
  <div id="loginForm">
    <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
    <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
    <button class="btn-primary" id="doLoginBtn">Authenticate →</button>
    <div><span id="forgotPwdLink" class="small-link">Forgot password?</span></div>
    <div id="loginErrorMsg" class="error"></div>
  </div>
  <div id="registerForm" style="display:none;">
    <div class="form-group"><input type="email" id="regEmail" placeholder="Email"></div>
    <div class="form-group"><input type="password" id="regPassword" placeholder="Password"></div>
    <div class="form-group"><input type="password" id="regConfirmPassword" placeholder="Confirm Password"></div>
    <button class="btn-primary" id="doRegisterBtn">Create Account →</button>
    <div id="registerErrorMsg" class="error"></div>
    <div id="registerSuccessMsg" class="success"></div>
  </div>
  <div id="resetPwdForm" style="display:none;">
    <div class="form-group"><input type="email" id="resetEmail" placeholder="Email"></div>
    <div class="form-group"><input type="password" id="newPassword" placeholder="New Password"></div>
    <div class="form-group"><input type="password" id="confirmNewPassword" placeholder="Confirm Password"></div>
    <button class="btn-primary" id="doResetBtn">Reset Password →</button>
    <div><span id="backToLoginLink" class="small-link">← Back to login</span></div>
    <div id="resetErrorMsg" class="error"></div>
    <div id="resetSuccessMsg" class="success"></div>
  </div>
  <div class="back-link"><a href="index.html">« Return to Home</a></div>
</div>
<script>
  const loginTab = document.getElementById('loginTab');
  const registerTab = document.getElementById('registerTab');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const resetForm = document.getElementById('resetPwdForm');

  loginTab.onclick = () => { loginTab.classList.add('active'); registerTab.classList.remove('active'); loginForm.style.display = 'block'; registerForm.style.display = 'none'; resetForm.style.display = 'none'; };
  registerTab.onclick = () => { registerTab.classList.add('active'); loginTab.classList.remove('active'); loginForm.style.display = 'none'; registerForm.style.display = 'block'; resetForm.style.display = 'none'; };
  document.getElementById('forgotPwdLink').onclick = () => { loginForm.style.display = 'none'; registerForm.style.display = 'none'; resetForm.style.display = 'block'; };
  document.getElementById('backToLoginLink').onclick = () => { resetForm.style.display = 'none'; loginForm.style.display = 'block'; };

  function register() {
    const email = document.getElementById('regEmail').value.trim();
    const pwd = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    const errSpan = document.getElementById('registerErrorMsg');
    const successSpan = document.getElementById('registerSuccessMsg');
    if (!email || !pwd) return errSpan.innerText = 'Email and password required.';
    if (pwd !== confirm) return errSpan.innerText = 'Passwords do not match.';
    if (pwd.length < 4) return errSpan.innerText = 'Password must be at least 4 characters.';
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (users[email]) return errSpan.innerText = 'Email already registered.';
    users[email] = { password: pwd };
    localStorage.setItem('armorai_users', JSON.stringify(users));
    localStorage.setItem('armorai_current_user', email);
    window.location.href = 'dashboard.html';
  }

  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const errSpan = document.getElementById('loginErrorMsg');
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (!users[email] || users[email].password !== pwd) return errSpan.innerText = 'Invalid email or password.';
    localStorage.setItem('armorai_current_user', email);
    window.location.href = 'dashboard.html';
  }

  function resetPassword() {
    const email = document.getElementById('resetEmail').value.trim();
    const newPwd = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmNewPassword').value;
    const errSpan = document.getElementById('resetErrorMsg');
    const successSpan = document.getElementById('resetSuccessMsg');
    if (!email) return errSpan.innerText = 'Email required.';
    if (newPwd !== confirm) return errSpan.innerText = 'Passwords do not match.';
    if (newPwd.length < 4) return errSpan.innerText = 'Password must be at least 4 characters.';
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (!users[email]) return errSpan.innerText = 'No account found.';
    users[email].password = newPwd;
    localStorage.setItem('armorai_users', JSON.stringify(users));
    successSpan.innerText = 'Password reset! You can now log in.';
    setTimeout(() => { resetForm.style.display = 'none'; loginForm.style.display = 'block'; successSpan.innerText = ''; }, 2000);
  }

  document.getElementById('doRegisterBtn').onclick = register;
  document.getElementById('doLoginBtn').onclick = login;
  document.getElementById('doResetBtn').onclick = resetPassword;
</script>
</body>
</html>
