<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMORAI — Secure Access Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  /* same styles as before – keep your existing */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(circle at 20% 30%, #0a0f1e, #010101);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1; }
  .orb1 { width: 500px; height: 500px; background: #00d4ff; top: -200px; left: -200px; }
  .orb2 { width: 600px; height: 600px; background: #7a2be0; bottom: -300px; right: -200px; }
  .auth-container {
    position: relative;
    z-index: 10;
    background: rgba(10, 18, 30, 0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 32px;
    padding: 48px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.3);
  }
  .logo { font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 800; text-align: center; background: linear-gradient(135deg, #fff, #0ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
  .tagline { font-size: 12px; text-align: center; color: #8ea3c2; margin-bottom: 32px; }
  .language-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .lang-select { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: #eef2ff; padding: 6px 12px; border-radius: 30px; font-size: 12px; cursor: pointer; }
  .tab-buttons { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 1px solid rgba(0,212,255,0.2); }
  .tab-btn { flex: 1; background: none; border: none; padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #6c86a3; cursor: pointer; }
  .tab-btn.active { color: #0ff; border-bottom: 2px solid #0ff; }
  .form-group { margin-bottom: 24px; }
  .form-group input { width: 100%; padding: 14px 18px; background: rgba(0,212,255,0.03); border: 1px solid rgba(0,212,255,0.2); border-radius: 60px; color: #eef2ff; font-size: 14px; transition: all 0.2s; outline: none; }
  .form-group input:focus { border-color: #0ff; background: rgba(0,212,255,0.08); box-shadow: 0 0 12px rgba(0,255,255,0.2); }
  .form-group input::placeholder { color: #4a6a8a; }
  .btn-primary { width: 100%; background: linear-gradient(90deg, #0ff, #7a2be0); border: none; padding: 14px; border-radius: 60px; font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 2px; color: #010101; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0,255,255,0.4); }
  .small-link { color: #0ff; font-size: 12px; text-decoration: underline; cursor: pointer; display: inline-block; margin-top: 16px; text-align: center; }
  .error { color: #ff8888; margin-top: 12px; font-size: 12px; text-align: center; }
  .success { color: #00ff88; margin-top: 12px; font-size: 12px; text-align: center; }
  .back-link { text-align: center; margin-top: 28px; }
  .back-link a { color: #6c86a3; font-size: 11px; text-decoration: none; }
  .back-link a:hover { color: #0ff; }
  .code-input-group { display: flex; gap: 10px; align-items: center; }
  .code-input-group input { flex: 1; }
  .code-input-group button { width: auto; padding: 14px 20px; margin-top: 0; white-space: nowrap; }
  @media (max-width: 550px) { .auth-container { padding: 32px 24px; } .logo { font-size: 32px; } }
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="auth-container">
  <div class="language-bar"><select id="armorLang" class="lang-select"><option value="en">🌐 English</option><option value="es">🇪🇸 Español</option><option value="fr">🇫🇷 Français</option><option value="de">🇩🇪 Deutsch</option></select></div>
  <div class="logo">ARMOR<span style="background:none; color:#0ff;">AI</span></div>
  <div class="tagline" data-i18n="tagline">SECURE ACCESS PORTAL</div>
  <div class="tab-buttons"><button class="tab-btn active" id="loginTab" data-i18n="loginTab">Login</button><button class="tab-btn" id="registerTab" data-i18n="registerTab">Register</button></div>

  <!-- LOGIN FLOW: step 1 (email/password) + step 2 (code) -->
  <div id="loginStep1">
    <div class="form-group"><input type="email" id="loginEmail" placeholder="Email" data-i18n-placeholder="emailPlaceholder"></div>
    <div class="form-group"><input type="password" id="loginPassword" placeholder="Password" data-i18n-placeholder="passwordPlaceholder"></div>
    <button class="btn-primary" id="requestLoginCodeBtn" data-i18n="loginBtn">Send Verification Code →</button>
    <div style="text-align:center"><span id="forgotPwdLink" class="small-link" data-i18n="forgotLink">Forgot password?</span></div>
    <div id="loginErrorMsg" class="error"></div>
  </div>
  <div id="loginStep2" style="display:none;">
    <div class="form-group"><input type="text" id="loginCode" placeholder="Enter 6‑digit code" data-i18n-placeholder="codePlaceholder"></div>
    <div class="code-input-group"><button class="btn-primary" id="verifyLoginCodeBtn" data-i18n="verifyBtn">Verify & Login →</button><button class="btn-primary btn-secondary" id="backToLoginStep1" style="background: #334155;">Back</button></div>
    <div id="codeErrorMsg" class="error"></div>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none;">
    <div class="form-group"><input type="text" id="regFirstName" placeholder="First Name" data-i18n-placeholder="firstNamePlaceholder"></div>
    <div class="form-group"><input type="text" id="regLastName" placeholder="Last Name" data-i18n-placeholder="lastNamePlaceholder"></div>
    <div class="form-group"><input type="email" id="regEmail" placeholder="Email" data-i18n-placeholder="emailPlaceholder"></div>
    <div class="form-group"><input type="password" id="regPassword" placeholder="Password" data-i18n-placeholder="passwordPlaceholder"></div>
    <div class="form-group"><input type="password" id="regConfirmPassword" placeholder="Confirm Password" data-i18n-placeholder="confirmPasswordPlaceholder"></div>
    <button class="btn-primary" id="doRegisterBtn" data-i18n="registerBtn">Create Account →</button>
    <div id="registerErrorMsg" class="error"></div>
    <div id="registerSuccessMsg" class="success"></div>
  </div>

  <!-- RESET PASSWORD FLOW (existing, sends code via email) -->
  <div id="resetPwdForm" style="display:none;">
    <div id="resetStep1">
      <div class="form-group"><input type="email" id="resetEmail" placeholder="Your Email" data-i18n-placeholder="resetEmailPlaceholder"></div>
      <button class="btn-primary" id="sendResetCodeBtn" data-i18n="sendResetCodeBtn">Send Reset Code →</button>
      <div id="resetSendError" class="error"></div><div id="resetSendSuccess" class="success"></div>
    </div>
    <div id="resetStep2" style="display:none;">
      <div class="form-group"><input type="text" id="resetCode" placeholder="Enter 6‑digit code" data-i18n-placeholder="codePlaceholder"></div>
      <div class="form-group"><input type="password" id="newResetPassword" placeholder="New Password" data-i18n-placeholder="newPasswordPlaceholder"></div>
      <div class="form-group"><input type="password" id="confirmResetPassword" placeholder="Confirm New Password" data-i18n-placeholder="confirmNewPasswordPlaceholder"></div>
      <button class="btn-primary" id="verifyResetBtn" data-i18n="resetBtn">Reset Password →</button>
      <div style="text-align:center"><span id="backToLoginFromReset" class="small-link" data-i18n="backLoginLink">← Back to login</span></div>
      <div id="resetErrorMsg" class="error"></div><div id="resetSuccessMsg" class="success"></div>
    </div>
  </div>

  <div class="back-link"><a href="index.html" data-i18n="backHomeLink">« Return to ArmorAI Home</a></div>
</div>

<script>
  // ========== CUSTOM TRANSLATOR (same as before, extended) ==========
  const translations = {
    en: {
      tagline: "SECURE ACCESS PORTAL", loginTab: "Login", registerTab: "Register",
      emailPlaceholder: "Email Address", passwordPlaceholder: "Password",
      loginBtn: "Send Verification Code →", forgotLink: "Forgot password?",
      firstNamePlaceholder: "First Name", lastNamePlaceholder: "Last Name",
      confirmPasswordPlaceholder: "Confirm Password", registerBtn: "Create Account →",
      resetEmailPlaceholder: "Your Email Address", newPasswordPlaceholder: "New Password",
      confirmNewPasswordPlaceholder: "Confirm New Password",
      sendResetCodeBtn: "Send Reset Code →", codePlaceholder: "Enter 6‑digit code",
      resetBtn: "Reset Password →", backLoginLink: "← Back to login",
      backHomeLink: "« Return to ArmorAI Home", verifyBtn: "Verify & Login →"
    },
    es: {
      tagline: "PORTAL DE ACCESO SEGURO", loginTab: "Iniciar Sesión", registerTab: "Registrarse",
      emailPlaceholder: "Correo Electrónico", passwordPlaceholder: "Contraseña",
      loginBtn: "Enviar Código de Verificación →", forgotLink: "¿Olvidaste tu contraseña?",
      firstNamePlaceholder: "Nombre", lastNamePlaceholder: "Apellido",
      confirmPasswordPlaceholder: "Confirmar Contraseña", registerBtn: "Crear Cuenta →",
      resetEmailPlaceholder: "Tu Correo Electrónico", newPasswordPlaceholder: "Nueva Contraseña",
      confirmNewPasswordPlaceholder: "Confirmar Nueva Contraseña",
      sendResetCodeBtn: "Enviar Código de Reinicio →", codePlaceholder: "Código de 6 dígitos",
      resetBtn: "Restablecer Contraseña →", backLoginLink: "← Volver a inicio de sesión",
      backHomeLink: "« Volver a ArmorAI", verifyBtn: "Verificar e Iniciar Sesión →"
    },
    fr: {
      tagline: "PORTAIL D'ACCÈS SÉCURISÉ", loginTab: "Connexion", registerTab: "S'inscrire",
      emailPlaceholder: "Adresse e-mail", passwordPlaceholder: "Mot de passe",
      loginBtn: "Envoyer le code de vérification →", forgotLink: "Mot de passe oublié ?",
      firstNamePlaceholder: "Prénom", lastNamePlaceholder: "Nom",
      confirmPasswordPlaceholder: "Confirmer le mot de passe", registerBtn: "Créer un compte →",
      resetEmailPlaceholder: "Votre adresse e-mail", newPasswordPlaceholder: "Nouveau mot de passe",
      confirmNewPasswordPlaceholder: "Confirmer le nouveau mot de passe",
      sendResetCodeBtn: "Envoyer le code de réinitialisation →", codePlaceholder: "Code à 6 chiffres",
      resetBtn: "Réinitialiser le mot de passe →", backLoginLink: "← Retour à la connexion",
      backHomeLink: "« Retour à ArmorAI", verifyBtn: "Vérifier et se connecter →"
    },
    de: {
      tagline: "SICHERER ZUGANGSPORTAL", loginTab: "Anmelden", registerTab: "Registrieren",
      emailPlaceholder: "E-Mail-Adresse", passwordPlaceholder: "Passwort",
      loginBtn: "Bestätigungscode senden →", forgotLink: "Passwort vergessen?",
      firstNamePlaceholder: "Vorname", lastNamePlaceholder: "Nachname",
      confirmPasswordPlaceholder: "Passwort bestätigen", registerBtn: "Konto erstellen →",
      resetEmailPlaceholder: "Ihre E-Mail-Adresse", newPasswordPlaceholder: "Neues Passwort",
      confirmNewPasswordPlaceholder: "Neues Passwort bestätigen",
      sendResetCodeBtn: "Reset-Code senden →", codePlaceholder: "6‑stelliger Code",
      resetBtn: "Passwort zurücksetzen →", backLoginLink: "← Zurück zum Login",
      backHomeLink: "« Zurück zu ArmorAI", verifyBtn: "Verifizieren & Anmelden →"
    }
  };

  function setLanguage(lang) {
    localStorage.setItem('armorai_lang', lang);
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (translations[lang] && translations[lang][key]) el.placeholder = translations[lang][key];
    });
  }
  const savedLang = localStorage.getItem('armorai_lang') || 'en';
  document.getElementById('armorLang').value = savedLang;
  setLanguage(savedLang);
  document.getElementById('armorLang').addEventListener('change', e => setLanguage(e.target.value));

  // ========== UI TAB SWITCHING ==========
  const loginTab = document.getElementById('loginTab'), registerTab = document.getElementById('registerTab');
  const loginStep1Div = document.getElementById('loginStep1');
  const loginStep2Div = document.getElementById('loginStep2');
  const registerForm = document.getElementById('registerForm');
  const resetForm = document.getElementById('resetPwdForm');
  const forgotLink = document.getElementById('forgotPwdLink');

  loginTab.onclick = () => {
    loginTab.classList.add('active'); registerTab.classList.remove('active');
    loginStep1Div.style.display = 'block'; loginStep2Div.style.display = 'none';
    registerForm.style.display = 'none'; resetForm.style.display = 'none';
  };
  registerTab.onclick = () => {
    registerTab.classList.add('active'); loginTab.classList.remove('active');
    registerForm.style.display = 'block'; loginStep1Div.style.display = 'none'; loginStep2Div.style.display = 'none';
    resetForm.style.display = 'none';
  };
  forgotLink.onclick = () => {
    registerForm.style.display = 'none'; loginStep1Div.style.display = 'none'; loginStep2Div.style.display = 'none';
    resetForm.style.display = 'block';
    document.getElementById('resetStep1').style.display = 'block';
    document.getElementById('resetStep2').style.display = 'none';
  };
  document.getElementById('backToLoginFromReset').onclick = () => {
    resetForm.style.display = 'none';
    loginStep1Div.style.display = 'block'; loginStep2Div.style.display = 'none';
  };
  document.getElementById('backToLoginStep1').onclick = () => {
    loginStep2Div.style.display = 'none'; loginStep1Div.style.display = 'block';
  };

  // ========== LOGIN WITH 2FA CODE ==========
  let pendingLoginEmail = null;
  let pendingLoginPassword = null;
  let pendingLoginCode = null;
  let loginCodeExpiry = null;

  document.getElementById('requestLoginCodeBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errSpan = document.getElementById('loginErrorMsg');
    errSpan.innerText = '';
    if (!email || !password) return errSpan.innerText = 'Email and password required.';
    // Validate credentials
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (!users[email] || users[email].password !== password) return errSpan.innerText = 'Invalid email or password.';
    // Store pending data
    pendingLoginEmail = email;
    pendingLoginPassword = password;
    // Generate and send code
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    pendingLoginCode = code;
    loginCodeExpiry = Date.now() + 10 * 60 * 1000;
    try {
      const response = await fetch('/api/send-login-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code })
      });
      const data = await response.json();
      if (response.ok) {
        errSpan.innerText = '';
        loginStep1Div.style.display = 'none';
        loginStep2Div.style.display = 'block';
        document.getElementById('codeErrorMsg').innerText = '';
        document.getElementById('loginCode').value = '';
      } else {
        errSpan.innerText = data.error || 'Failed to send code.';
      }
    } catch (err) {
      errSpan.innerText = 'Network error. Please try again.';
    }
  };

  document.getElementById('verifyLoginCodeBtn').onclick = () => {
    const enteredCode = document.getElementById('loginCode').value.trim();
    const errSpan = document.getElementById('codeErrorMsg');
    if (!pendingLoginEmail || !pendingLoginCode) {
      errSpan.innerText = 'Session expired. Please restart login.';
      return;
    }
    if (Date.now() > loginCodeExpiry) {
      errSpan.innerText = 'Code expired. Request a new one.';
      return;
    }
    if (enteredCode !== pendingLoginCode) {
      errSpan.innerText = 'Invalid code.';
      return;
    }
    // Code correct – complete login
    localStorage.setItem('armorai_current_user', pendingLoginEmail);
    window.location.href = 'dashboard.html';
  };

  // ========== REGISTER ==========
  function register() {
    const firstName = document.getElementById('regFirstName').value.trim();
    const lastName = document.getElementById('regLastName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pwd = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    const errSpan = document.getElementById('registerErrorMsg');
    const successSpan = document.getElementById('registerSuccessMsg');
    if (!firstName || !lastName) return errSpan.innerText = 'First and last name required.';
    if (!email || !pwd) return errSpan.innerText = 'Email and password required.';
    if (pwd !== confirm) return errSpan.innerText = 'Passwords do not match.';
    if (pwd.length < 4) return errSpan.innerText = 'Password must be at least 4 characters.';
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (users[email]) return errSpan.innerText = 'Email already registered.';
    users[email] = { password: pwd, firstName, lastName, fullName: `${firstName} ${lastName}` };
    localStorage.setItem('armorai_users', JSON.stringify(users));
    localStorage.setItem('armorai_current_user', email);
    window.location.href = 'dashboard.html';
  }
  document.getElementById('doRegisterBtn').onclick = register;

  // ========== RESET PASSWORD (email code flow) ==========
  let pendingResetEmail = null, pendingResetCode = null, resetCodeExpiry = null;
  document.getElementById('sendResetCodeBtn').onclick = async () => {
    const email = document.getElementById('resetEmail').value.trim();
    const errSpan = document.getElementById('resetSendError');
    const successSpan = document.getElementById('resetSendSuccess');
    errSpan.innerText = ''; successSpan.innerText = '';
    if (!email) return errSpan.innerText = 'Email required.';
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (!users[email]) return errSpan.innerText = 'No account found with that email.';
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    pendingResetEmail = email;
    pendingResetCode = code;
    resetCodeExpiry = Date.now() + 10 * 60 * 1000;
    try {
      const response = await fetch('/api/send-reset-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code })
      });
      const data = await response.json();
      if (response.ok) {
        successSpan.innerText = `Reset code sent to ${email}. Check your inbox.`;
        document.getElementById('resetStep1').style.display = 'none';
        document.getElementById('resetStep2').style.display = 'block';
      } else {
        errSpan.innerText = data.error || 'Failed to send email.';
      }
    } catch (err) {
      errSpan.innerText = 'Network error.';
    }
  };
  document.getElementById('verifyResetBtn').onclick = () => {
    const enteredCode = document.getElementById('resetCode').value.trim();
    const newPwd = document.getElementById('newResetPassword').value;
    const confirmPwd = document.getElementById('confirmResetPassword').value;
    const errSpan = document.getElementById('resetErrorMsg');
    const successSpan = document.getElementById('resetSuccessMsg');
    errSpan.innerText = ''; successSpan.innerText = '';
    if (!pendingResetEmail || !pendingResetCode) return errSpan.innerText = 'Session expired.';
    if (Date.now() > resetCodeExpiry) return errSpan.innerText = 'Code expired.';
    if (enteredCode !== pendingResetCode) return errSpan.innerText = 'Invalid code.';
    if (!newPwd || newPwd.length < 4) return errSpan.innerText = 'Password must be at least 4 characters.';
    if (newPwd !== confirmPwd) return errSpan.innerText = 'Passwords do not match.';
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (users[pendingResetEmail]) {
      users[pendingResetEmail].password = newPwd;
      localStorage.setItem('armorai_users', JSON.stringify(users));
      successSpan.innerText = 'Password reset successful! You can now log in.';
      setTimeout(() => {
        document.getElementById('resetStep2').style.display = 'none';
        document.getElementById('resetStep1').style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
        loginStep1Div.style.display = 'block';
        loginStep2Div.style.display = 'none';
        successSpan.innerText = '';
      }, 2000);
    } else {
      errSpan.innerText = 'Account not found.';
    }
  };
</script>
</body>
</html>
