<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMORAI — Secure Access Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: radial-gradient(circle at 20% 30%, #0a0f1e, #010101);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    z-index: -1;
  }
  .orb1 { width: 500px; height: 500px; background: #00d4ff; top: -200px; left: -200px; }
  .orb2 { width: 600px; height: 600px; background: #7a2be0; bottom: -300px; right: -200px; }

  /* Main auth card */
  .auth-container {
    position: relative;
    z-index: 10;
    background: rgba(10, 18, 30, 0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 32px;
    padding: 48px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
    transition: all 0.3s;
  }

  .auth-container:hover {
    border-color: #0ff;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
  }

  /* Logo */
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    font-weight: 800;
    text-align: center;
    background: linear-gradient(135deg, #fff, #0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .tagline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    text-align: center;
    color: #8ea3c2;
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  /* Language dropdown */
  .language-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
  }

  .lang-select {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    color: #eef2ff;
    padding: 6px 12px;
    border-radius: 30px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', monospace;
  }

  /* Tabs */
  .tab-buttons {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border-bottom: 1px solid rgba(0, 212, 255, 0.2);
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6c86a3;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: #0ff;
    border-bottom: 2px solid #0ff;
  }

  /* Form groups */
  .form-group {
    margin-bottom: 24px;
  }

  .form-group input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(0, 212, 255, 0.03);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 60px;
    color: #eef2ff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
    outline: none;
  }

  .form-group input:focus {
    border-color: #0ff;
    background: rgba(0, 212, 255, 0.08);
    box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
  }

  .form-group input::placeholder {
    color: #4a6a8a;
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    background: linear-gradient(90deg, #0ff, #7a2be0);
    border: none;
    padding: 14px;
    border-radius: 60px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #010101;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
  }

  /* Links */
  .small-link {
    color: #0ff;
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', monospace;
    display: inline-block;
    margin-top: 16px;
    text-align: center;
    transition: 0.2s;
  }

  .small-link:hover {
    text-shadow: 0 0 5px #0ff;
  }

  .error {
    color: #ff8888;
    margin-top: 12px;
    font-size: 12px;
    text-align: center;
  }

  .success {
    color: #00ff88;
    margin-top: 12px;
    font-size: 12px;
    text-align: center;
  }

  /* Back link */
  .back-link {
    text-align: center;
    margin-top: 28px;
  }

  .back-link a {
    color: #6c86a3;
    font-family: 'Plus Jakarta Sans', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-decoration: none;
    transition: 0.2s;
  }

  .back-link a:hover {
    color: #0ff;
  }

  /* Responsive */
  @media (max-width: 550px) {
    .auth-container { padding: 32px 24px; }
    .logo { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="auth-container">
  <div class="language-bar">
    <select id="armorLang" class="lang-select">
      <option value="en">🌐 English</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
    </select>
  </div>

  <div class="logo">ARMOR<span style="background: none; -webkit-background-clip: unset; color: #0ff;">AI</span></div>
  <div class="tagline" data-i18n="tagline">SECURE ACCESS PORTAL</div>

  <div class="tab-buttons">
    <button class="tab-btn active" id="loginTab" data-i18n="loginTab">Login</button>
    <button class="tab-btn" id="registerTab" data-i18n="registerTab">Register</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group"><input type="email" id="loginEmail" placeholder="Email Address" data-i18n-placeholder="emailPlaceholder"></div>
    <div class="form-group"><input type="password" id="loginPassword" placeholder="Password" data-i18n-placeholder="passwordPlaceholder"></div>
    <button class="btn-primary" id="doLoginBtn" data-i18n="loginBtn">Authenticate →</button>
    <div style="text-align: center;"><span id="forgotPwdLink" class="small-link" data-i18n="forgotLink">Forgot password?</span></div>
    <div id="loginErrorMsg" class="error"></div>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:none;">
    <div class="form-group"><input type="email" id="regEmail" placeholder="Email Address" data-i18n-placeholder="emailPlaceholder"></div>
    <div class="form-group"><input type="password" id="regPassword" placeholder="Create Password" data-i18n-placeholder="createPasswordPlaceholder"></div>
    <div class="form-group"><input type="password" id="regConfirmPassword" placeholder="Confirm Password" data-i18n-placeholder="confirmPasswordPlaceholder"></div>
    <button class="btn-primary" id="doRegisterBtn" data-i18n="registerBtn">Create Account →</button>
    <div id="registerErrorMsg" class="error"></div>
    <div id="registerSuccessMsg" class="success"></div>
  </div>

  <!-- Reset Password Form -->
  <div id="resetPwdForm" style="display:none;">
    <div class="form-group"><input type="email" id="resetEmail" placeholder="Your Email Address" data-i18n-placeholder="resetEmailPlaceholder"></div>
    <div class="form-group"><input type="password" id="newPassword" placeholder="New Password" data-i18n-placeholder="newPasswordPlaceholder"></div>
    <div class="form-group"><input type="password" id="confirmNewPassword" placeholder="Confirm New Password" data-i18n-placeholder="confirmNewPasswordPlaceholder"></div>
    <button class="btn-primary" id="doResetBtn" data-i18n="resetBtn">Reset Password →</button>
    <div style="text-align: center;"><span id="backToLoginLink" class="small-link" data-i18n="backLoginLink">← Back to login</span></div>
    <div id="resetErrorMsg" class="error"></div>
    <div id="resetSuccessMsg" class="success"></div>
  </div>

  <div class="back-link"><a href="index.html" data-i18n="backHomeLink">« Return to ArmorAI Home</a></div>
</div>

<script>
  // ========== CUSTOM ARMORAI TRANSLATOR ==========
  const translations = {
    en: {
      tagline: "SECURE ACCESS PORTAL",
      loginTab: "Login",
      registerTab: "Register",
      emailPlaceholder: "Email Address",
      passwordPlaceholder: "Password",
      loginBtn: "Authenticate →",
      forgotLink: "Forgot password?",
      createPasswordPlaceholder: "Create Password",
      confirmPasswordPlaceholder: "Confirm Password",
      registerBtn: "Create Account →",
      resetEmailPlaceholder: "Your Email Address",
      newPasswordPlaceholder: "New Password",
      confirmNewPasswordPlaceholder: "Confirm New Password",
      resetBtn: "Reset Password →",
      backLoginLink: "← Back to login",
      backHomeLink: "« Return to ArmorAI Home"
    },
    es: {
      tagline: "PORTAL DE ACCESO SEGURO",
      loginTab: "Iniciar Sesión",
      registerTab: "Registrarse",
      emailPlaceholder: "Correo Electrónico",
      passwordPlaceholder: "Contraseña",
      loginBtn: "Autenticar →",
      forgotLink: "¿Olvidaste tu contraseña?",
      createPasswordPlaceholder: "Crear Contraseña",
      confirmPasswordPlaceholder: "Confirmar Contraseña",
      registerBtn: "Crear Cuenta →",
      resetEmailPlaceholder: "Tu Correo Electrónico",
      newPasswordPlaceholder: "Nueva Contraseña",
      confirmNewPasswordPlaceholder: "Confirmar Nueva Contraseña",
      resetBtn: "Restablecer Contraseña →",
      backLoginLink: "← Volver a inicio de sesión",
      backHomeLink: "« Volver a ArmorAI"
    },
    fr: {
      tagline: "PORTAIL D'ACCÈS SÉCURISÉ",
      loginTab: "Connexion",
      registerTab: "S'inscrire",
      emailPlaceholder: "Adresse e-mail",
      passwordPlaceholder: "Mot de passe",
      loginBtn: "S'authentifier →",
      forgotLink: "Mot de passe oublié ?",
      createPasswordPlaceholder: "Créer un mot de passe",
      confirmPasswordPlaceholder: "Confirmer le mot de passe",
      registerBtn: "Créer un compte →",
      resetEmailPlaceholder: "Votre adresse e-mail",
      newPasswordPlaceholder: "Nouveau mot de passe",
      confirmNewPasswordPlaceholder: "Confirmer le nouveau mot de passe",
      resetBtn: "Réinitialiser le mot de passe →",
      backLoginLink: "← Retour à la connexion",
      backHomeLink: "« Retour à ArmorAI"
    },
    de: {
      tagline: "SICHERER ZUGANGSPORTAL",
      loginTab: "Anmelden",
      registerTab: "Registrieren",
      emailPlaceholder: "E-Mail-Adresse",
      passwordPlaceholder: "Passwort",
      loginBtn: "Authentifizieren →",
      forgotLink: "Passwort vergessen?",
      createPasswordPlaceholder: "Passwort erstellen",
      confirmPasswordPlaceholder: "Passwort bestätigen",
      registerBtn: "Konto erstellen →",
      resetEmailPlaceholder: "Ihre E-Mail-Adresse",
      newPasswordPlaceholder: "Neues Passwort",
      confirmNewPasswordPlaceholder: "Neues Passwort bestätigen",
      resetBtn: "Passwort zurücksetzen →",
      backLoginLink: "← Zurück zum Login",
      backHomeLink: "« Zurück zu ArmorAI"
    }
  };

  function setLanguage(lang) {
    localStorage.setItem('armorai_lang', lang);
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang] && translations[lang][key]) {
        el.innerText = translations[lang][key];
      }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (translations[lang] && translations[lang][key]) {
        el.placeholder = translations[lang][key];
      }
    });
  }

  const savedLang = localStorage.getItem('armorai_lang') || 'en';
  document.getElementById('armorLang').value = savedLang;
  setLanguage(savedLang);
  document.getElementById('armorLang').addEventListener('change', (e) => setLanguage(e.target.value));

  // ========== AUTH LOGIC ==========
  const loginTab = document.getElementById('loginTab');
  const registerTab = document.getElementById('registerTab');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const resetForm = document.getElementById('resetPwdForm');
  const forgotLink = document.getElementById('forgotPwdLink');
  const backToLogin = document.getElementById('backToLoginLink');

  loginTab.onclick = () => {
    loginTab.classList.add('active'); registerTab.classList.remove('active');
    loginForm.style.display = 'block'; registerForm.style.display = 'none'; resetForm.style.display = 'none';
  };
  registerTab.onclick = () => {
    registerTab.classList.add('active'); loginTab.classList.remove('active');
    loginForm.style.display = 'none'; registerForm.style.display = 'block'; resetForm.style.display = 'none';
  };
  forgotLink.onclick = () => {
    loginForm.style.display = 'none'; registerForm.style.display = 'none'; resetForm.style.display = 'block';
  };
  backToLogin.onclick = () => {
    resetForm.style.display = 'none'; loginForm.style.display = 'block';
  };

  function register() {
    const email = document.getElementById('regEmail').value.trim();
    const pwd = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    const errSpan = document.getElementById('registerErrorMsg');
    const successSpan = document.getElementById('registerSuccessMsg');
    if (!email || !pwd) return errSpan.innerText = 'Email and password required.';
    if (pwd !== confirm) return errSpan.innerText = 'Passwords do not match.';
    if (pwd.length < 4) return errSpan.innerText = 'Password must be at least 4 characters.';
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (users[email]) return errSpan.innerText = 'Email already registered.';
    users[email] = { password: pwd };
    localStorage.setItem('armorai_users', JSON.stringify(users));
    localStorage.setItem('armorai_current_user', email);
    window.location.href = 'dashboard.html';
  }

  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const errSpan = document.getElementById('loginErrorMsg');
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (!users[email] || users[email].password !== pwd) return errSpan.innerText = 'Invalid email or password.';
    localStorage.setItem('armorai_current_user', email);
    window.location.href = 'dashboard.html';
  }

  function resetPassword() {
    const email = document.getElementById('resetEmail').value.trim();
    const newPwd = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmNewPassword').value;
    const errSpan = document.getElementById('resetErrorMsg');
    const successSpan = document.getElementById('resetSuccessMsg');
    if (!email) return errSpan.innerText = 'Email required.';
    if (newPwd !== confirm) return errSpan.innerText = 'Passwords do not match.';
    if (newPwd.length < 4) return errSpan.innerText = 'Password must be at least 4 characters.';
    let users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
    if (!users[email]) return errSpan.innerText = 'No account found.';
    users[email].password = newPwd;
    localStorage.setItem('armorai_users', JSON.stringify(users));
    successSpan.innerText = 'Password reset! You can now log in.';
    setTimeout(() => {
      resetForm.style.display = 'none';
      loginForm.style.display = 'block';
      successSpan.innerText = '';
    }, 2000);
  }

  document.getElementById('doRegisterBtn').onclick = register;
  document.getElementById('doLoginBtn').onclick = login;
  document.getElementById('doResetBtn').onclick = resetPassword;
</script>
</body>
</html>
