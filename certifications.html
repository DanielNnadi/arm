<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(circle at 20% 30%, #0a0f1e, #010101);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #eef2ff;
    overflow-x: hidden;
    position: relative;
  }
  /* Animated grid background (same as dashboard) */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
  /* Glowing orbs */
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1; }
  .orb1 { width: 500px; height: 500px; background: #00d4ff; top: -200px; left: -200px; }
  .orb2 { width: 600px; height: 600px; background: #7a2be0; bottom: -300px; right: -200px; }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: rgba(2, 6, 20, 0.75);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(0,212,255,0.2);
  }
  .nav-logo { font-size: 28px; font-weight: 800; font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #fff, #0ff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-links a, .logout-btn { font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #ccd6f6; text-decoration: none; background: none; border: none; cursor: pointer; }
  .nav-links a:hover, .logout-btn:hover { color: #0ff; text-shadow: 0 0 5px #0ff; }
  .lang-select { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: #eef2ff; padding: 6px 12px; border-radius: 30px; font-size: 12px; cursor: pointer; }
  .cert-container { max-width: 1400px; margin: 0 auto; padding: 120px 60px 80px; position: relative; z-index: 10; }
  .page-title { font-size: 48px; font-weight: 800; font-family: 'Orbitron', sans-serif; background: linear-gradient(120deg, #fff, #0ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 16px; }
  .page-sub { color: #8ea3c2; margin-bottom: 48px; font-size: 16px; }
  .company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
  .company-card { background: rgba(10,18,30,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0,212,255,0.2); border-radius: 28px; padding: 24px; transition: all 0.3s; }
  .company-card:hover { border-color: #0ff; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
  .company-card h3 { font-size: 24px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; color: #0ff; font-family: 'Orbitron', sans-serif; }
  .company-card h3 i { font-size: 28px; }
  .domain-list { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
  .domain-btn { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); padding: 8px 16px; border-radius: 40px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; color: #ccd6f6; }
  .domain-btn:hover { background: rgba(0,212,255,0.3); border-color: #0ff; color: #0ff; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(16px); z-index: 2000; justify-content: center; align-items: center; }
  .modal-card { background: rgba(10,18,30,0.9); backdrop-filter: blur(16px); border: 1px solid rgba(0,212,255,0.3); border-radius: 32px; padding: 32px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
  .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .quiz-title { font-size: 24px; font-weight: 600; color: #0ff; font-family: 'Orbitron', sans-serif; }
  .timer { font-family: 'Orbitron', monospace; font-size: 20px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 40px; color: #0ff; }
  .warning { background: rgba(255,60,60,0.2); border: 1px solid #f33; padding: 12px; border-radius: 16px; text-align: center; margin-bottom: 20px; color: #ffaa88; }
  .question-text { font-size: 20px; font-weight: 500; margin-bottom: 28px; }
  .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
  .option { background: rgba(20,30,50,0.8); border: 1px solid rgba(0,212,255,0.2); border-radius: 60px; padding: 14px 20px; cursor: pointer; transition: all 0.2s; font-size: 15px; }
  .option:hover { background: rgba(0,212,255,0.1); border-color: #0ff; }
  .option.selected { background: rgba(0,212,255,0.2); border-color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.4); }
  .feedback { padding: 12px 16px; border-radius: 16px; margin: 16px 0; font-size: 14px; }
  .feedback.correct { background: rgba(0,255,100,0.15); border-left: 4px solid #0f0; color: #8effaa; }
  .feedback.incorrect { background: rgba(255,60,60,0.15); border-left: 4px solid #f33; color: #ffaa88; }
  .quiz-nav { display: flex; gap: 16px; margin-top: 20px; }
  .btn-glow { background: linear-gradient(90deg, #0ff, #7a2be0); border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; color: #010101; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; }
  .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: #eef2ff; }
  footer { text-align: center; padding: 30px; border-top: 1px solid rgba(0,212,255,0.1); margin-top: 60px; font-size: 12px; color: #6c86a3; }
  /* Certificate styles */
  .certificate {
    background: white;
    color: black;
    padding: 40px;
    text-align: center;
    font-family: 'Times New Roman', Georgia, serif;
    max-width: 800px;
    margin: 0 auto;
    box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    border-radius: 4px;
  }
  .certificate h1 { font-size: 32px; color: #1a5d8f; margin-bottom: 20px; }
  .certificate h2 { font-size: 28px; color: #1a5d8f; margin: 20px 0; }
  .certificate h3 { font-size: 20px; color: #c9a84c; margin: 10px 0; }
  .certificate p { font-size: 14px; color: #666; }
  .certificate .signature { margin-top: 30px; text-align: right; }
  @media (max-width: 800px) {
    .cert-container { padding: 100px 24px 60px; }
    .certificate { padding: 20px; }
  }

<script>
  // ========== AUTH ==========
  const currentUser = localStorage.getItem('armorai_current_user');
  if (!currentUser) window.location.href = 'login.html';
  const users = JSON.parse(localStorage.getItem('armorai_users') || '{}');
  const userData = users[currentUser] || {};
  const userFullName = userData.fullName || currentUser.split('@')[0];
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem('armorai_current_user');
    window.location.href = 'login.html';
  };

  // ========== TRANSLATOR ==========
  function setLanguage(lang) { localStorage.setItem('armorai_lang', lang); }
  const savedLang = localStorage.getItem('armorai_lang') || 'en';
  document.getElementById('armorLang').value = savedLang;
  setLanguage(savedLang);
  document.getElementById('armorLang').addEventListener('change', e => setLanguage(e.target.value));

  // ========== 20 COMPANIES WITH REAL LOGOS ==========
  const companies = [
    { id: "google", name: "Google", logo: "fab fa-google", domains: ["Cybersecurity", "Software Development", "Data Analytics", "Cloud Engineering"] },

    { id: "salesforce", name: "Salesforce", logo: "fab fa-salesforce", domains: ["Software Development", "Data Analytics", "Cloud Engineering", "IT Infrastructure"] },
    { id: "oracle", name: "Oracle", logo: "fas fa-database", domains: ["Database", "Cloud Engineering", "Cybersecurity", "Software Development"] },
    { id: "ibm", name: "IBM", logo: "fab fa-ibm", domains: ["Artificial Intelligence", "Cybersecurity", "Database", "Cloud Engineering"] },
    { id: "cisco", name: "Cisco", logo: "fas fa-network-wired", domains: ["Networking", "Cybersecurity", "Cloud Engineering", "IT Infrastructure"] },
    { id: "adobe", name: "Adobe", logo: "fab fa-adobe", domains: ["Web Design", "Software Development", "Data Analytics", "Cybersecurity"] },
    { id: "paypal", name: "PayPal", logo: "fab fa-paypal", domains: ["Software Development", "Cybersecurity", "Data Analytics", "IT Infrastructure"] },
    { id: "uber", name: "Uber", logo: "fas fa-taxi", domains: ["Software Development", "Data Analytics", "Cloud Engineering", "Cybersecurity"] },
    { id: "airbnb", name: "Airbnb", logo: "fas fa-home", domains: ["Web Design", "Software Development", "Data Analytics", "Cybersecurity"] },
    { id: "spotify", name: "Spotify", logo: "fab fa-spotify", domains: ["Software Development", "Data Analytics", "Cloud Engineering", "Artificial Intelligence"] },
    { id: "twitter", name: "Twitter", logo: "fab fa-twitter", domains: ["Software Development", "Data Analytics", "Cybersecurity", "Web Design"] }

  // ========== TASKS FOR CERTIFICATE ==========
  const practicalTasks = {
    "google-Cybersecurity": ["Threat intelligence analysis and risk profiling", "Predicting attack vectors with AI", "Incident response and data storytelling for security strategy", "Implementing an AI-driven autonomous defense strategy"],
    "google-Software Development": ["Building scalable microservices with Go", "Implementing CI/CD pipelines on Google Cloud Build", "Code review and security scanning", "Developing RESTful APIs"],
    "microsoft-Cybersecurity": ["Azure Security Center implementation", "Identity and access management with Azure AD", "Threat protection with Microsoft Defender", "Cloud security posture management"],
    "apple-Cybersecurity": ["iOS security framework analysis", "App transport security implementation", "Keychain services integration", "Privacy manifest configuration"]
  };

  function getPracticalTasks(companyId, domain) {
    const key = `${companyId}-${domain}`;
    if (practicalTasks[key]) return practicalTasks[key];
    return ["Security risk assessment and threat modeling", "Implementing secure coding practices", "Incident detection and response planning", "Security compliance and audit preparation"];
  }

  // ========== QUESTION BANK ==========
  const questionBank = {
    "Cybersecurity": [
      { text: "What is the primary purpose of a firewall?", opts: ["To detect viruses", "To monitor and filter network traffic", "To encrypt data", "To manage passwords"], correct: 1, exp: "Firewalls monitor and filter network traffic." },
      { text: "What does VPN stand for?", opts: ["Virtual Private Network", "Very Private Network", "Virtual Protected Node", "Verified Personal Network"], correct: 0, exp: "VPN creates a secure, encrypted connection." },
      { text: "What is a zero-day vulnerability?", opts: ["A vulnerability known for zero days", "A patched vulnerability", "A vulnerability with no available fix", "A vulnerability in zero-day software"], correct: 2, exp: "Zero‑day means no patch exists yet." },
      { text: "Which protocol is used for secure web browsing?", opts: ["HTTP", "FTP", "HTTPS", "SSH"], correct: 2, exp: "HTTPS encrypts data between browser and server." },
      { text: "What is the main goal of a DDoS attack?", opts: ["Data theft", "Disrupt service availability", "Gain unauthorized access", "Encrypt files"], correct: 1, exp: "DDoS aims to overwhelm a service." },
      { text: "Which is a form of social engineering?", opts: ["Phishing", "SQL injection", "Buffer overflow", "Man-in-the-middle"], correct: 0, exp: "Phishing manipulates users." },
      { text: "What does IDS stand for?", opts: ["Intrusion Detection System", "Internet Data Service", "Internal Drive System", "Integrated Defense System"], correct: 0, exp: "IDS detects suspicious activity." },
      { text: "Which encryption is considered strong?", opts: ["DES", "RSA-2048", "MD5", "RC4"], correct: 1, exp: "RSA-2048 is widely used." },
      { text: "What is a common phishing indicator?", opts: ["Spelling errors", "Unknown sender", "Urgent request", "All of the above"], correct: 3, exp: "Phishing emails have multiple red flags." },
      { text: "What is the best defense against ransomware?", opts: ["Regular backups", "Antivirus only", "Firewall only", "Disabling internet"], correct: 0, exp: "Backups allow recovery without paying." }
    ],
    "Software Development": [
      { text: "Which data structure uses LIFO?", opts: ["Queue", "Array", "Stack", "Linked List"], correct: 2, exp: "Stack is Last In, First Out." },
      { text: "What does git commit do?", opts: ["Saves changes locally", "Uploads to remote", "Shows status", "Creates a branch"], correct: 0, exp: "git commit saves staged changes." },
      { text: "What does API stand for?", opts: ["Application Programming Interface", "Advanced Programming Integration", "Application Protocol Interface", "Automated Program Interface"], correct: 0, exp: "API defines software interactions." },
      { text: "Which language is for Android?", opts: ["Swift", "Kotlin", "C#", "PHP"], correct: 1, exp: "Kotlin is official for Android." },
      { text: "What is a constructor?", opts: ["To destroy an object", "To initialize an object", "To define methods", "To create a class"], correct: 1, exp: "Constructor initializes object state." },
      { text: "Which is a NoSQL database?", opts: ["MySQL", "PostgreSQL", "MongoDB", "SQLite"], correct: 2, exp: "MongoDB is document-oriented." },
      { text: "What is binary search time complexity?", opts: ["O(n)", "O(log n)", "O(n²)", "O(1)"], correct: 1, exp: "Binary search runs in logarithmic time." },
      { text: "What does CSS stand for?", opts: ["Cascading Style Sheets", "Creative Style Sheets", "Computer Style Sheets", "Colorful Style Sheets"], correct: 0, exp: "CSS styles HTML." },
      { text: "Which keyword defines a constant in JS?", opts: ["let", "var", "const", "static"], correct: 2, exp: "const declares constants." },
      { text: "What is a closure?", opts: ["A function with outer scope access", "A loop construct", "A built-in object", "A variable type"], correct: 0, exp: "Closures remember their environment." }
    ],
    "Data Analytics": [
      { text: "What does SQL stand for?", opts: ["Structured Query Language", "Simple Query Language", "Standard Query Language", "Sequential Query Language"], correct: 0, exp: "SQL manages databases." },
      { text: "Which Python library is for data visualization?", opts: ["Matplotlib", "NumPy", "Pandas", "Scikit-learn"], correct: 0, exp: "Matplotlib creates charts." },
      { text: "What is data cleaning?", opts: ["Removing errors", "Adding data", "Encrypting data", "Backing up data"], correct: 0, exp: "Data cleaning fixes errors." }
    ],
    "Cloud Engineering": [
      { text: "What does IaaS stand for?", opts: ["Infrastructure as a Service", "Integration as a Service", "Internet as a Service", "Information as a Service"], correct: 0, exp: "IaaS provides virtual resources." },
      { text: "Which AWS service is for storage?", opts: ["S3", "EC2", "Lambda", "RDS"], correct: 0, exp: "S3 is object storage." },
      { text: "What is serverless?", opts: ["No server management", "No servers at all", "Physical servers only", "Mainframe computing"], correct: 0, exp: "Serverless abstracts infrastructure." }
    ],
    "Database": [
      { text: "What is a primary key?", opts: ["Unique identifier", "Foreign key", "Index", "Query"], correct: 0, exp: "Primary key uniquely identifies a row." },
      { text: "Which SQL statement retrieves data?", opts: ["SELECT", "INSERT", "UPDATE", "DELETE"], correct: 0, exp: "SELECT queries data." }
    ],
    "Artificial Intelligence": [
      { text: "What is machine learning?", opts: ["A subset of AI", "A type of database", "A programming language", "A hardware component"], correct: 0, exp: "ML is a branch of AI." },
      { text: "Which algorithm is for classification?", opts: ["Decision tree", "Linear regression", "K-means", "PCA"], correct: 0, exp: "Decision trees classify data." }
    ],
    "Web Design": [
      { text: "What does HTML stand for?", opts: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyper Transfer Markup Language", "Home Tool Markup Language"], correct: 0, exp: "HTML structures web content." },
      { text: "Which CSS property changes background color?", opts: ["background-color", "color", "bgcolor", "background"], correct: 0, exp: "background-color sets the background." }
    ],
    "IT Infrastructure": [
      { text: "What does DNS stand for?", opts: ["Domain Name System", "Digital Network Service", "Data Name System", "Domain Network Service"], correct: 0, exp: "DNS translates domain names to IP addresses." },
      { text: "What is a load balancer?", opts: ["Distribute traffic", "Encrypt data", "Store backups", "Monitor network"], correct: 0, exp: "Load balancers distribute traffic." }
    ],
    "Networking": [
      { text: "What is the OSI model?", opts: ["Conceptual network model", "Cable type", "Security protocol", "Programming language"], correct: 0, exp: "OSI standardizes network communication." },
      { text: "Which device connects different networks?", opts: ["Router", "Switch", "Hub", "Modem"], correct: 0, exp: "Routers connect different networks." }
    ]
  };

  function getRandomQuestions(domain, num = 10) {
    let bank = questionBank[domain];
    if (!bank) bank = questionBank["Cybersecurity"];
    const shuffled = [...bank];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, num);
  }

  // ========== LOAD COMPANIES WITH CLICK HANDLERS ==========
  function loadCompanies() {
    const grid = document.getElementById('companyGrid');
    grid.innerHTML = '';
    companies.forEach(company => {
      const card = document.createElement('div');
      card.className = 'company-card';
      card.innerHTML = `
        <h3><i class="${company.logo}"></i> ${company.name}</h3>
        <div class="domain-list">
          ${company.domains.map(domain => `<button class="domain-btn" data-company="${company.id}" data-domain="${domain}">${domain}</button>`).join('')}
        </div>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll('.domain-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const companyId = this.getAttribute('data-company');
        const domain = this.getAttribute('data-domain');
        startQuiz(companyId, domain);
      });
    });
  }

  // ========== QUIZ LOGIC ==========
  let currentQuiz = null, timerInterval = null, timeLeft = 30, cheatingTimeout = null, quizActive = false;
  let currentQuestionIndex = 0, userAnswers = [], questionAnswered = false, selectedOption = null;

  function startQuiz(companyId, domain) {
    const questions = getRandomQuestions(domain, 10);
    if (!questions || questions.length === 0) {
      alert('No questions for this domain yet.');
      return;
    }
    currentQuiz = { companyId, domain, questions };
    currentQuestionIndex = 0;
    userAnswers = new Array(10).fill(null);
    questionAnswered = false;
    selectedOption = null;
    timeLeft = 30;
    document.getElementById('timerDisplay').innerText = '00:30';
    renderCurrentQuestion();
    document.getElementById('quizModal').style.display = 'flex';
    document.getElementById('quizResult').innerHTML = '';
    document.getElementById('warningMsg').style.display = 'none';
    quizActive = true;
    startTimer();

    const handleVisibilityChange = () => {
      if (!quizActive) return;
      if (document.hidden) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('warningMsg').style.display = 'block';
        if (cheatingTimeout) clearTimeout(cheatingTimeout);
        cheatingTimeout = setTimeout(() => {
          if (quizActive) {
            clearInterval(timerInterval);
            quizActive = false;
            document.getElementById('quizResult').innerHTML = '<span style="color:#ff8888;">❌ Quiz terminated due to tab switching.</span>';
            setTimeout(() => document.getElementById('quizModal').style.display = 'none', 2000);
          }
        }, 3000);
      } else {
        if (cheatingTimeout) clearTimeout(cheatingTimeout);
        document.getElementById('warningMsg').style.display = 'none';
        if (quizActive) startTimer();
      }
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.cleanupVisibility = () => document.removeEventListener('visibilitychange', handleVisibilityChange);
  }

  function renderCurrentQuestion() {
    const q = currentQuiz.questions[currentQuestionIndex];
    const company = companies.find(c => c.id === currentQuiz.companyId);
    document.getElementById('quizTitle').innerHTML = `${company.name} – ${currentQuiz.domain}`;
    const container = document.getElementById('quizQuestions');
    const userAnswer = userAnswers[currentQuestionIndex];
    let html = `<div class="question-text">${currentQuestionIndex+1}. ${q.text}</div><div class="options">`;
    q.options.forEach((opt, idx) => {
      html += `<div class="option ${userAnswer === idx ? 'selected' : ''}" data-opt="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
    });
    html += `</div><div id="feedbackArea" class="feedback"></div>`;
    container.innerHTML = html;
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        if (questionAnswered) return;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedOption = parseInt(opt.dataset.opt);
      });
    });
    if (userAnswer !== null) {
      const wasCorrect = (userAnswer === q.correct);
      const fbDiv = document.getElementById('feedbackArea');
      fbDiv.className = `feedback ${wasCorrect ? 'correct' : 'incorrect'}`;
      fbDiv.innerHTML = wasCorrect ? `✅ Correct! ${q.exp}` : `❌ Incorrect. Correct answer: ${q.options[q.correct]}. ${q.exp}`;
      questionAnswered = true;
    } else {
      questionAnswered = false;
    }
  }

  function handleSubmit() {
    if (!quizActive) return;
    const q = currentQuiz.questions[currentQuestionIndex];
    if (userAnswers[currentQuestionIndex] === null) {
      if (selectedOption === null) {
        document.getElementById('feedbackArea').innerHTML = '<span style="color:#ffaa44;">⚠️ Please select an answer first.</span>';
        return;
      }
      userAnswers[currentQuestionIndex] = selectedOption;
      const isCorrect = (selectedOption === q.correct);
      const fbDiv = document.getElementById('feedbackArea');
      fbDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
      fbDiv.innerHTML = isCorrect ? `✅ Correct! ${q.exp}` : `❌ Incorrect. Correct answer: ${q.options[q.correct]}. ${q.exp}`;
      questionAnswered = true;
      selectedOption = null;
      return;
    }
    if (currentQuestionIndex + 1 < currentQuiz.questions.length) {
      currentQuestionIndex++;
      selectedOption = null;
      questionAnswered = false;
      timeLeft = 30;
      document.getElementById('timerDisplay').innerText = '00:30';
      renderCurrentQuestion();
    } else {
      const score = userAnswers.reduce((acc, ans, idx) => acc + (ans === currentQuiz.questions[idx].correct ? 1 : 0), 0);
      if (score === 10) {
        document.getElementById('quizResult').innerHTML = '<span style="color:#00ff88;">🏆 Perfect score! Generating your certificate...</span>';
        clearInterval(timerInterval);
        quizActive = false;
        generateCertificate();
      } else {
        document.getElementById('quizResult').innerHTML = `<span style="color:#ff8888;">You scored ${score}/10. Need 10/10 for certificate.</span>`;
        clearInterval(timerInterval);
        quizActive = false;
      }
    }
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!quizActive) return;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        document.getElementById('quizResult').innerHTML = '<span style="color:#ff8888;">⏰ Time ran out. Moving to next...</span>';
        setTimeout(() => {
          if (currentQuestionIndex + 1 < currentQuiz.questions.length) {
            currentQuestionIndex++;
            selectedOption = null;
            questionAnswered = false;
            timeLeft = 30;
            document.getElementById('timerDisplay').innerText = '00:30';
            renderCurrentQuestion();
          } else {
            document.getElementById('quizResult').innerHTML = '<span style="color:#ff8888;">Time ran out. Quiz ended.</span>';
            quizActive = false;
          }
        }, 1500);
      } else {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }
    }, 1000);
  }

  document.getElementById('submitQuiz').onclick = handleSubmit;
  document.getElementById('closeQuizModal').onclick = () => {
    clearInterval(timerInterval);
    quizActive = false;
    if (window.cleanupVisibility) window.cleanupVisibility();
    document.getElementById('quizModal').style.display = 'none';
  };
  document.getElementById('closeCertModal').onclick = () => {
    document.getElementById('certificateModal').style.display = 'none';
  };

  // ========== CERTIFICATE GENERATION ==========
  function generateCertificate() {
    const company = companies.find(c => c.id === currentQuiz.companyId);
    const jobRole = currentQuiz.domain;
    const completionDate = new Date().toISOString().split('T')[0];
    const enrolmentCode = 'ARM-ENR-' + Math.random().toString(36).substring(2, 8).toUpperCase();
    const userCode = Math.random().toString(36).substring(2, 15);
    const tasks = getPracticalTasks(company.id, jobRole);
    const certHtml = `
      <div class="certificate" id="certificateToPrint">
        <h1>CERTIFICATE OF COMPLETION</h1>
        <p>This is to certify that</p>
        <h2>${userFullName}</h2>
        <p>has successfully completed the</p>
        <h3>${company.name} – ${jobRole}</h3>
        <p>job simulation with a perfect score.</p>
        <div class="tasks" style="text-align:left; margin:20px 0; padding-left:20px;">
          <p><strong>Practical tasks completed:</strong></p>
          <ul style="padding-left:20px;">
            ${tasks.map(task => `<li>${task}</li>`).join('')}
          </ul>
        </div>
        <p>Date: ${completionDate}</p>
        <div class="signature">
          <p>Nnadi Daniel</p>
          <p>Founder & CEO, ArmorAI</p>
        </div>
        <p style="margin-top:20px; font-size:11px;">Verification Code: ${enrolmentCode} | User Code: ${userCode}</p>
        <p style="font-size:11px;">www.armorai.tech</p>
      </div>
    `;
    document.getElementById('certificateContent').innerHTML = certHtml;
    document.getElementById('quizModal').style.display = 'none';
    document.getElementById('certificateModal').style.display = 'flex';
  }

  document.getElementById('downloadPdf').onclick = () => {
    const element = document.getElementById('certificateToPrint');
    html2pdf().set({ margin: 0.2, filename: 'ArmorAI_Certificate.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save();
  };
  document.getElementById('shareLinkedIn').onclick = () => {
    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}&title=ArmorAI%20Certification`, '_blank');
  };

  loadCompanies();
</script>
</body>
</html>
