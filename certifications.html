  function getRandomQuestions(domain, num = 10) {
    let bank = questionBank[domain];
    if (!bank) {
      console.warn(`No questions for ${domain}, using Cybersecurity`);
      bank = questionBank["Cybersecurity"];
    }
    const shuffled = [...bank];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, num);
  }

    if (timerDisplay) timerDisplay.innerText = '00:30';
    
    renderCurrentQuestion();
    
    const quizModal = document.getElementById('quizModal');
    if (quizModal) quizModal.style.display = 'flex';
    
    const quizResult = document.getElementById('quizResult');
    if (quizResult) quizResult.innerHTML = '';
    
    const warningMsg = document.getElementById('warningMsg');
    if (warningMsg) warningMsg.style.display = 'none';
    
    quizActive = true;
    startTimer();

    const handleVisibilityChange = () => {
      if (!quizActive) return;
      if (document.hidden) {
        if (timerInterval) clearInterval(timerInterval);
        const warningMsgDiv = document.getElementById('warningMsg');
        if (warningMsgDiv) warningMsgDiv.style.display = 'block';
        if (cheatingTimeout) clearTimeout(cheatingTimeout);
        cheatingTimeout = setTimeout(() => {
          if (quizActive) {
            clearInterval(timerInterval);
            quizActive = false;
            const quizResultDiv = document.getElementById('quizResult');
            if (quizResultDiv) quizResultDiv.innerHTML = '<span style="color:#ff8888;">❌ Quiz terminated due to tab switching.</span>';
            setTimeout(() => {
              const modal = document.getElementById('quizModal');
              if (modal) modal.style.display = 'none';
            }, 2000);
          }
        }, 3000);
      } else {
        if (cheatingTimeout) clearTimeout(cheatingTimeout);
        const warningMsgDiv = document.getElementById('warningMsg');
        if (warningMsgDiv) warningMsgDiv.style.display = 'none';
        if (quizActive) startTimer();
      }
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.cleanupVisibility = () => document.removeEventListener('visibilitychange', handleVisibilityChange);
  }

  function renderCurrentQuestion() {
    if (!currentQuiz) return;
    
    const q = currentQuiz.questions[currentQuestionIndex];
    const company = companies.find(c => c.id === currentQuiz.companyId);
    const quizTitle = document.getElementById('quizTitle');
    if (quizTitle) quizTitle.innerHTML = `${company ? company.name : currentQuiz.companyId} – ${currentQuiz.domain}`;
    
    const container = document.getElementById('quizQuestions');
    if (!container) return;
    
    const userAnswer = userAnswers[currentQuestionIndex];
    let html = `<div class="question-text">${currentQuestionIndex+1}. ${q.text}</div><div class="options">`;
    q.options.forEach((opt, idx) => {
      const letter = String.fromCharCode(65 + idx);
      html += `<div class="option ${userAnswer === idx ? 'selected' : ''}" data-opt="${idx}">${letter}. ${opt}</div>`;
    });
    html += `</div><div id="feedbackArea" class="feedback"></div>`;
    container.innerHTML = html;
    
    // Add click handlers to options
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        if (questionAnswered) return;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedOption = parseInt(opt.dataset.opt);
      });
    });
    
    if (userAnswer !== null) {
      const wasCorrect = (userAnswer === q.correct);
      const fbDiv = document.getElementById('feedbackArea');
      if (fbDiv) {
        fbDiv.className = `feedback ${wasCorrect ? 'correct' : 'incorrect'}`;
        fbDiv.innerHTML = wasCorrect ? `✅ Correct! ${q.exp || ''}` : `❌ Incorrect. Correct answer: ${q.options[q.correct]}. ${q.exp || ''}`;
      }
      questionAnswered = true;
    } else {
      questionAnswered = false;
    }
  }

  function handleSubmit() {
    if (!quizActive || !currentQuiz) return;
    
    const q = currentQuiz.questions[currentQuestionIndex];
    
    if (userAnswers[currentQuestionIndex] === null) {
      if (selectedOption === null) {
        const fbDiv = document.getElementById('feedbackArea');
        if (fbDiv) fbDiv.innerHTML = '<span style="color:#ffaa44;">⚠️ Please select an answer first.</span>';
        return;
      }
      userAnswers[currentQuestionIndex] = selectedOption;
      const isCorrect = (selectedOption === q.correct);
      const fbDiv = document.getElementById('feedbackArea');
      if (fbDiv) {
        fbDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
        fbDiv.innerHTML = isCorrect ? `✅ Correct! ${q.exp || ''}` : `❌ Incorrect. Correct answer: ${q.options[q.correct]}. ${q.exp || ''}`;
      }
      questionAnswered = true;
      selectedOption = null;
      return;
    }
    
    if (currentQuestionIndex + 1 < currentQuiz.questions.length) {
      currentQuestionIndex++;
      selectedOption = null;
      questionAnswered = false;
      timeLeft = 30;
      const timerDisplay = document.getElementById('timerDisplay');
      if (timerDisplay) timerDisplay.innerText = '00:30';
      renderCurrentQuestion();
    } else {
      let score = 0;
      for (let i = 0; i < currentQuiz.questions.length; i++) {
        if (userAnswers[i] === currentQuiz.questions[i].correct) score++;
      }
      if (score === 10) {
        const quizResult = document.getElementById('quizResult');
        if (quizResult) quizResult.innerHTML = '<span style="color:#00ff88;">🏆 Perfect score! Generating your certificate...</span>';
        clearInterval(timerInterval);
        quizActive = false;
        generateCertificate();
      } else {
        const quizResult = document.getElementById('quizResult');
        if (quizResult) quizResult.innerHTML = `<span style="color:#ff8888;">You scored ${score}/10. Need 10/10 for certificate.</span>`;
        clearInterval(timerInterval);
        quizActive = false;
      }
    }
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!quizActive) return;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        const quizResult = document.getElementById('quizResult');
        if (quizResult) quizResult.innerHTML = '<span style="color:#ff8888;">⏰ Time ran out. Moving to next...</span>';
        setTimeout(() => {
          if (currentQuiz && currentQuestionIndex + 1 < currentQuiz.questions.length) {
            currentQuestionIndex++;
            selectedOption = null;
            questionAnswered = false;
            timeLeft = 30;
            const timerDisplay = document.getElementById('timerDisplay');
            if (timerDisplay) timerDisplay.innerText = '00:30';
            renderCurrentQuestion();
            startTimer();
          } else {
            const resultDiv = document.getElementById('quizResult');
            if (resultDiv) resultDiv.innerHTML = '<span style="color:#ff8888;">Time ran out. Quiz ended.</span>';
            quizActive = false;
          }
        }, 1500);
      } else {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        const timerDisplay = document.getElementById('timerDisplay');
        if (timerDisplay) timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }
    }, 1000);
  }

  const submitBtn = document.getElementById('submitQuiz');
  if (submitBtn) submitBtn.onclick = handleSubmit;
  
  const closeQuizBtn = document.getElementById('closeQuizModal');
  if (closeQuizBtn) {
    closeQuizBtn.onclick = () => {
      clearInterval(timerInterval);
      quizActive = false;
      if (window.cleanupVisibility) window.cleanupVisibility();
      const modal = document.getElementById('quizModal');
      if (modal) modal.style.display = 'none';
    };
  }
  
  const closeCertBtn = document.getElementById('closeCertModal');
  if (closeCertBtn) {
    closeCertBtn.onclick = () => {
      const modal = document.getElementById('certificateModal');
      if (modal) modal.style.display = 'none';
    };
  }

  // ========== CERTIFICATE GENERATION ==========
  function generateCertificate() {
    const company = companies.find(c => c.id === currentQuiz.companyId);
    const jobRole = currentQuiz.domain;
    const completionDate = new Date().toISOString().split('T')[0];
    const enrolmentCode = 'ARM-ENR-' + Math.random().toString(36).substring(2, 8).toUpperCase();
    const userCode = Math.random().toString(36).substring(2, 15);
    const tasks = getPracticalTasks(company.id, jobRole);
    
    const certHtml = `
      <div class="certificate" id="certificateToPrint">
        <h1>CERTIFICATE OF COMPLETION</h1>
        <p>This is to certify that</p>
        <h2>${userFullName}</h2>
        <p>has successfully completed the</p>
        <h3>${company.name} – ${jobRole}</h3>
        <p>job simulation with a perfect score.</p>
        <div class="tasks" style="text-align:left; margin:20px 0; padding-left:20px;">
          <p><strong>Practical tasks completed:</strong></p>
          <ul style="padding-left:20px;">
            ${tasks.map(task => `<li>${task}</li>`).join('')}
          </ul>
        </div>
        <p>Date: ${completionDate}</p>
        <div class="signature">
          <p>Nnadi Daniel</p>
          <p>Founder & CEO, ArmorAI</p>
        </div>
        <p style="margin-top:20px; font-size:11px;">Verification Code: ${enrolmentCode} | User Code: ${userCode}</p>
        <p style="font-size:11px;">www.armorai.tech</p>
      </div>
    `;
    
    const certContent = document.getElementById('certificateContent');
    if (certContent) certContent.innerHTML = certHtml;
    
    const quizModal = document.getElementById('quizModal');
    if (quizModal) quizModal.style.display = 'none';
    
    const certModal = document.getElementById('certificateModal');
    if (certModal) certModal.style.display = 'flex';
  }

  const downloadBtn = document.getElementById('downloadPdf');
  if (downloadBtn) {
    downloadBtn.onclick = () => {
      const element = document.getElementById('certificateToPrint');
      if (element && typeof html2pdf !== 'undefined') {
        html2pdf().set({ margin: 0.2, filename: 'ArmorAI_Certificate.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save();
      } else {
        alert("PDF library loading. Please try again in a moment.");
      }
    };
  }
  
  const shareBtn = document.getElementById('shareLinkedIn');
  if (shareBtn) {
    shareBtn.onclick = () => {
      window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}&title=ArmorAI%20Certification`, '_blank');
    };
  }

  // Initialize
  loadCompanies();
  console.log("Certifications page loaded. Companies:", companies.length);
</script>
</body>
</html>
