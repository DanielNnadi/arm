<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArmorAI – Job Simulations & Certifications</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="certifications.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: radial-gradient(circle at 20% 30%, #0a0f1e, #010101);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #eef2ff;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    z-index: -1;
  }
  .orb1 { width: 500px; height: 500px; background: #00d4ff; top: -200px; left: -200px; }
  .orb2 { width: 600px; height: 600px; background: #7a2be0; bottom: -300px; right: -200px; }

  /* Navigation */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: rgba(2, 6, 20, 0.75);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(0, 212, 255, 0.2);
  }

  .nav-logo {
    font-size: 28px;
    font-weight: 800;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, #fff, #0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 2px;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .nav-links a, .logout-btn {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ccd6f6;
    text-decoration: none;
    transition: 0.2s;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .nav-links a:hover, .logout-btn:hover {
    color: #0ff;
    text-shadow: 0 0 5px #0ff;
  }

  /* Translator dropdown */
  .lang-select {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    color: #eef2ff;
    padding: 6px 12px;
    border-radius: 30px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', monospace;
  }

  /* Main container */
  .cert-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 120px 60px 80px;
    position: relative;
    z-index: 10;
  }

  .page-title {
    font-size: 48px;
    font-weight: 800;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(120deg, #fff, #0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 16px;
  }

  .page-sub {
    color: #8ea3c2;
    margin-bottom: 48px;
    font-size: 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  /* Company grid */
  .company-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
  }

  .company-card {
    background: rgba(10, 18, 30, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 28px;
    padding: 24px;
    transition: all 0.3s;
  }

  .company-card:hover {
    border-color: #0ff;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
  }

  .company-card h3 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #0ff;
    font-family: 'Orbitron', sans-serif;
  }

  .domain-list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 16px;
  }

  .domain-btn {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    color: #ccd6f6;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .domain-btn:hover {
    background: rgba(0, 212, 255, 0.3);
    border-color: #0ff;
    color: #0ff;
  }

  /* Preview button */
  .preview-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid #0ff;
    color: #0ff;
    padding: 10px 20px;
    border-radius: 40px;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 30px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: 0.2s;
  }
  .preview-btn:hover {
    background: rgba(0, 212, 255, 0.2);
  }

  /* Modal styles */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(16px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
  }

  .modal-card {
    background: rgba(10, 18, 30, 0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 32px;
    padding: 32px;
    width: 90%;
    max-width: 700px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .quiz-title {
    font-size: 24px;
    font-weight: 600;
    color: #0ff;
    font-family: 'Orbitron', sans-serif;
  }

  .timer {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    background: rgba(0, 0, 0, 0.5);
    padding: 6px 12px;
    border-radius: 40px;
    color: #0ff;
  }

  .warning {
    background: rgba(255, 60, 60, 0.2);
    border: 1px solid #f33;
    padding: 12px;
    border-radius: 16px;
    text-align: center;
    margin-bottom: 20px;
    color: #ffaa88;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .question-text {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 28px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
  }

  .option {
    background: rgba(20, 30, 50, 0.8);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 60px;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .option:hover {
    background: rgba(0, 212, 255, 0.1);
    border-color: #0ff;
  }

  .option.selected {
    background: rgba(0, 212, 255, 0.2);
    border-color: #0ff;
    box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
  }

  .feedback {
    padding: 12px 16px;
    border-radius: 16px;
    margin: 16px 0;
    font-size: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .feedback.correct {
    background: rgba(0, 255, 100, 0.15);
    border-left: 4px solid #0f0;
    color: #8effaa;
  }

  .feedback.incorrect {
    background: rgba(255, 60, 60, 0.15);
    border-left: 4px solid #f33;
    color: #ffaa88;
  }

  .quiz-nav {
    display: flex;
    gap: 16px;
    margin-top: 20px;
  }

  .btn-glow {
    background: linear-gradient(90deg, #0ff, #7a2be0);
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    font-weight: 600;
    color: #010101;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
  }

  .btn-glow:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 15px #0ff;
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    color: #eef2ff;
  }

  .certificate-preview {
    background: white;
    color: black;
    padding: 40px;
    text-align: center;
    border-radius: 24px;
    font-family: 'Times New Roman', serif;
  }

  footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid rgba(0, 212, 255, 0.1);
    margin-top: 60px;
    font-size: 12px;
    color: #6c86a3;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  @media (max-width: 900px) {
    nav { padding: 16px 24px; }
    .cert-container { padding: 100px 24px 60px; }
  }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
  <div class="nav-logo">ARMORAI</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="certifications.html">Certifications</a>
    <select id="armorLang" class="lang-select">
      <option value="en">🌐 English</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
    </select>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</nav>

<div class="cert-container">
  <h1 class="page-title" data-i18n="certTitle">Job <span style="color:#0ff;">Simulations</span></h1>
  <p class="page-sub" data-i18n="certDesc">Earn a certificate by scoring 100% on any 10‑question quiz. Choose a company and domain below.</p>
  
  <!-- Preview Certificate button (visible only to creator email) -->
  <div id="previewButtonContainer" style="text-align: center; margin-bottom: 20px;"></div>
  
  <div id="companyGrid" class="company-grid"></div>
</div>

<!-- Quiz Modal -->
<div id="quizModal" class="modal">
  <div class="modal-card">
    <div class="question-header">
      <div class="quiz-title" id="quizTitle"></div>
      <div class="timer" id="timerDisplay">00:30</div>
    </div>
    <div id="warningMsg" class="warning" style="display:none;" data-i18n="cheatWarning">⚠️ Switching tabs is not allowed. Returning within 3 seconds to continue...</div>
    <div id="quizQuestions"></div>
    <div class="quiz-nav">
      <button id="submitQuiz" class="btn-glow" data-i18n="submitBtn">Submit →</button>
      <button id="closeQuizModal" class="btn-glow btn-secondary" data-i18n="cancelBtn">Cancel</button>
    </div>
    <div id="quizResult" style="margin-top: 20px;"></div>
  </div>
</div>

<!-- Certificate Modal -->
<div id="certificateModal" class="modal">
  <div class="modal-card">
    <div id="certificateContent"></div>
    <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: center;">
      <button id="downloadPdf" class="btn-glow" data-i18n="downloadPdf">Download PDF</button>
      <button id="shareLinkedIn" class="btn-glow btn-secondary" data-i18n="shareLinkedIn">Share on LinkedIn</button>
      <button id="closeCertModal" class="btn-glow btn-secondary" data-i18n="closeBtn">Close</button>
    </div>
  </div>
</div>

<footer>© 2026 ArmorAI — AI‑Driven Certifications</footer>

<script>
  // ========== TRANSLATOR ==========
  const translations = {
    en: { certTitle: "Job Simulations", certDesc: "Earn a certificate by scoring 100% on any 10‑question quiz. Choose a company and domain below.", cheatWarning: "⚠️ Switching tabs is not allowed. Returning within 3 seconds to continue...", submitBtn: "Submit →", cancelBtn: "Cancel", downloadPdf: "Download PDF", shareLinkedIn: "Share on LinkedIn", closeBtn: "Close" },
    es: { certTitle: "Simulaciones de Empleo", certDesc: "Obtén un certificado respondiendo correctamente las 10 preguntas de cualquier cuestionario. Elige una empresa y dominio.", cheatWarning: "⚠️ No se permite cambiar de pestaña. Regresa en 3 segundos para continuar...", submitBtn: "Enviar →", cancelBtn: "Cancelar", downloadPdf: "Descargar PDF", shareLinkedIn: "Compartir en LinkedIn", closeBtn: "Cerrar" },
    fr: { certTitle: "Simulations d'Emploi", certDesc: "Obtenez un certificé en répondant correctement aux 10 questions de n'importe quel quiz. Choisissez une entreprise et un domaine.", cheatWarning: "⚠️ Changer d'onglet n'est pas autorisé. Revenez dans 3 secondes pour continuer...", submitBtn: "Soumettre →", cancelBtn: "Annuler", downloadPdf: "Télécharger PDF", shareLinkedIn: "Partager sur LinkedIn", closeBtn: "Fermer" },
    de: { certTitle: "Jobsimulationen", certDesc: "Erhalten Sie ein Zertifikat, indem Sie alle 10 Fragen eines Quiz richtig beantworten. Wählen Sie ein Unternehmen und einen Bereich.", cheatWarning: "⚠️ Wechseln der Registerkarte ist nicht erlaubt. Kehren Sie innerhalb von 3 Sekunden zurück, um fortzufahren...", submitBtn: "Einreichen →", cancelBtn: "Abbrechen", downloadPdf: "PDF herunterladen", shareLinkedIn: "Auf LinkedIn teilen", closeBtn: "Schließen" }
  };

  function setLanguage(lang) {
    localStorage.setItem('armorai_lang', lang);
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang] && translations[lang][key]) {
        if (el.tagName === 'BUTTON') el.innerText = translations[lang][key];
        else el.innerText = translations[lang][key];
      }
    });
  }

  const savedLang = localStorage.getItem('armorai_lang') || 'en';
  document.getElementById('armorLang').value = savedLang;
  setLanguage(savedLang);
  document.getElementById('armorLang').addEventListener('change', (e) => setLanguage(e.target.value));

  // ========== AUTH ==========
  const currentUser = localStorage.getItem('armorai_current_user');
  if (!currentUser) window.location.href = 'login.html';
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem('armorai_current_user');
    window.location.href = 'login.html';
  };

  // ========== PREVIEW CERTIFICATE FOR CREATOR ==========
  const previewContainer = document.getElementById('previewButtonContainer');
  if (currentUser === 'armoraitech@gmail.com') {
    const previewBtn = document.createElement('button');
    previewBtn.innerText = '👁️ Preview Certificate (Creator Only)';
    previewBtn.className = 'preview-btn';
    previewBtn.onclick = () => {
      // Generate a preview certificate without taking a quiz
      const previewCompany = { id: "google", name: "Google", logo: "🔍" };
      const previewDomain = "Cybersecurity";
      const previewUser = currentUser;
      const previewDate = new Date().toISOString().split('T')[0];
      const previewCode = 'ARM-PREVIEW-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      const previewUrl = `${window.location.origin}/verify?code=${previewCode}`;
      const certHtml = `
        <div class="certificate-preview" id="certificateToPrint">
          <div style="border: 2px solid #00d4ff; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div style="font-size: 24px; font-weight: bold;">🔍 Google</div>
              <div style="font-size: 18px; font-weight: bold; color: #00d4ff;">ARMORAI</div>
            </div>
            <hr style="margin: 20px 0;">
            <h1 style="font-size: 28px;">Certificate of Completion</h1>
            <p>This is to certify that</p>
            <h2 style="font-size: 26px; color: #00d4ff;">${previewUser}</h2>
            <p>has successfully completed the</p>
            <h3 style="font-size: 22px;">Google – Cybersecurity</h3>
            <p>job simulation with a perfect score.</p>
            <p>Date: ${previewDate}</p>
            <p>Verification Code: ${previewCode}</p>
            <p>Verify at: <a href="${previewUrl}" target="_blank">${previewUrl}</a></p>
            <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
              <p>Nnadi Daniel</p>
              <p><em>Founder, ArmorAI</em></p>
              <p>✍️ Digitally Signed</p>
            </div>
          </div>
        </div>
      `;
      document.getElementById('certificateContent').innerHTML = certHtml;
      document.getElementById('certificateModal').style.display = 'flex';
      window.currentCertUrl = previewUrl;
    };
    previewContainer.appendChild(previewBtn);
  }

  // ========== LOAD COMPANIES ==========
  function loadCompanies() {
    const grid = document.getElementById('companyGrid');
    grid.innerHTML = '';
    companies.forEach(company => {
      const card = document.createElement('div');
      card.className = 'company-card';
      card.innerHTML = `
        <h3>${company.logo} ${company.name}</h3>
        <div class="domain-list">
          ${company.domains.map(domain => `<button class="domain-btn" data-company="${company.id}" data-domain="${domain}">${domain}</button>`).join('')}
        </div>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll('.domain-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const companyId = btn.dataset.company;
        const domain = btn.dataset.domain;
        startQuiz(companyId, domain);
      });
    });
  }

  // ========== QUIZ LOGIC (unchanged, same as before) ==========
  let currentQuiz = null;
  let timerInterval = null;
  let timeLeft = 30;
  let cheatingTimeout = null;
  let quizActive = false;
  let currentQuestionIndex = 0;
  let userAnswers = [];
  let questionAnswered = false;
  let selectedOption = null;

  function startQuiz(companyId, domain) {
    const questions = getRandomQuestions(domain, 10);
    if (!questions || questions.length === 0) {
      alert('No questions for this domain yet.');
      return;
    }
    currentQuiz = {
      companyId,
      domain,
      questions,
      userAnswers: new Array(10).fill(null),
      currentQIndex: 0
    };
    currentQuestionIndex = 0;
    userAnswers = new Array(10).fill(null);
    questionAnswered = false;
    selectedOption = null;
    timeLeft = 30;
    document.getElementById('timerDisplay').innerText = '00:30';
    renderCurrentQuestion();
    document.getElementById('quizModal').style.display = 'flex';
    document.getElementById('quizResult').innerHTML = '';
    document.getElementById('warningMsg').style.display = 'none';
    quizActive = true;
    startTimer();

    const handleVisibilityChange = () => {
      if (!quizActive) return;
      if (document.hidden) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('warningMsg').style.display = 'block';
        if (cheatingTimeout) clearTimeout(cheatingTimeout);
        cheatingTimeout = setTimeout(() => {
          if (quizActive) {
            clearInterval(timerInterval);
            quizActive = false;
            document.getElementById('quizResult').innerHTML = '<span style="color:#ff8888;">❌ Quiz terminated due to tab switching.</span>';
            setTimeout(() => document.getElementById('quizModal').style.display = 'none', 2000);
          }
        }, 3000);
      } else {
        if (cheatingTimeout) clearTimeout(cheatingTimeout);
        document.getElementById('warningMsg').style.display = 'none';
        if (quizActive) startTimer();
      }
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.cleanupVisibility = () => document.removeEventListener('visibilitychange', handleVisibilityChange);
  }

  function renderCurrentQuestion() {
    const q = currentQuiz.questions[currentQuestionIndex];
    document.getElementById('quizTitle').innerHTML = `${currentQuiz.companyId.toUpperCase()} – ${currentQuiz.domain}`;
    const container = document.getElementById('quizQuestions');
    const userAnswer = userAnswers[currentQuestionIndex];
    let html = `
      <div class="question-text">${currentQuestionIndex+1}. ${q.text}</div>
      <div class="options" id="optionsArea">
        ${q.options.map((opt, idx) => `
          <div class="option ${userAnswer === idx ? 'selected' : ''}" data-opt="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>
        `).join('')}
      </div>
      <div id="feedbackArea" class="feedback"></div>
    `;
    container.innerHTML = html;
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        if (questionAnswered) return;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedOption = parseInt(opt.dataset.opt);
      });
    });
    if (userAnswer !== null) {
      const wasCorrect = (userAnswer === q.correct);
      const fbDiv = document.getElementById('feedbackArea');
      fbDiv.className = `feedback ${wasCorrect ? 'correct' : 'incorrect'}`;
      fbDiv.innerHTML = wasCorrect ? `✅ Correct! ${q.explanation}` : `❌ Incorrect. Correct answer: ${q.options[q.correct]}. ${q.explanation}`;
      questionAnswered = true;
    } else {
      questionAnswered = false;
    }
  }

  function handleSubmit() {
    if (!quizActive) return;
    const q = currentQuiz.questions[currentQuestionIndex];
    if (userAnswers[currentQuestionIndex] === null) {
      if (selectedOption === null) {
        document.getElementById('feedbackArea').innerHTML = '<span style="color:#ffaa44;">⚠️ Please select an answer first.</span>';
        return;
      }
      userAnswers[currentQuestionIndex] = selectedOption;
      const isCorrect = (selectedOption === q.correct);
      const fbDiv = document.getElementById('feedbackArea');
      fbDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
      fbDiv.innerHTML = isCorrect ? `✅ Correct! ${q.explanation}` : `❌ Incorrect. Correct answer: ${q.options[q.correct]}. ${q.explanation}`;
      questionAnswered = true;
      selectedOption = null;
      return;
    }
    if (currentQuestionIndex + 1 < currentQuiz.questions.length) {
      currentQuestionIndex++;
      selectedOption = null;
      questionAnswered = false;
      timeLeft = 30;
      document.getElementById('timerDisplay').innerText = '00:30';
      renderCurrentQuestion();
    } else {
      const score = userAnswers.reduce((acc, ans, idx) => acc + (ans === currentQuiz.questions[idx].correct ? 1 : 0), 0);
      if (score === 10) {
        document.getElementById('quizResult').innerHTML = '<span style="color:#00ff88;">🏆 Perfect score! Generating your certificate...</span>';
        clearInterval(timerInterval);
        quizActive = false;
        generateCertificate();
      } else {
        document.getElementById('quizResult').innerHTML = `<span style="color:#ff8888;">You scored ${score}/10. Need 10/10 for certificate.</span>`;
        clearInterval(timerInterval);
        quizActive = false;
      }
    }
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!quizActive) return;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        document.getElementById('quizResult').innerHTML = '<span style="color:#ff8888;">⏰ Time ran out. Moving to next question...</span>';
        setTimeout(() => {
          if (currentQuestionIndex + 1 < currentQuiz.questions.length) {
            currentQuestionIndex++;
            selectedOption = null;
            questionAnswered = false;
            timeLeft = 30;
            document.getElementById('timerDisplay').innerText = '00:30';
            renderCurrentQuestion();
          } else {
            document.getElementById('quizResult').innerHTML = '<span style="color:#ff8888;">Time ran out. Quiz ended.</span>';
            quizActive = false;
          }
        }, 1500);
      } else {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      }
    }, 1000);
  }

  document.getElementById('submitQuiz').onclick = handleSubmit;
  document.getElementById('closeQuizModal').onclick = () => {
    clearInterval(timerInterval);
    quizActive = false;
    if (window.cleanupVisibility) window.cleanupVisibility();
    document.getElementById('quizModal').style.display = 'none';
  };

  function generateCertificate() {
    const company = companies.find(c => c.id === currentQuiz.companyId);
    const userName = currentUser;
    const jobRole = currentQuiz.domain;
    const completionDate = new Date().toISOString().split('T')[0];
    const verificationCode = 'ARM-' + Math.random().toString(36).substring(2, 15).toUpperCase();
    const verificationUrl = `${window.location.origin}/verify?code=${verificationCode}`;
    let userCerts = JSON.parse(localStorage.getItem('armorai_certs') || '{}');
    if (!userCerts[currentUser]) userCerts[currentUser] = [];
    userCerts[currentUser].push({
      companyId: currentQuiz.companyId,
      domain: currentQuiz.domain,
      date: completionDate,
      code: verificationCode,
      verificationUrl
    });
    localStorage.setItem('armorai_certs', JSON.stringify(userCerts));
    const certHtml = `
      <div class="certificate-preview" id="certificateToPrint">
        <div style="border: 2px solid #00d4ff; padding: 20px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 24px; font-weight: bold;">${company.logo} ${company.name}</div>
            <div style="font-size: 18px; font-weight: bold; color: #00d4ff;">ARMORAI</div>
          </div>
          <hr style="margin: 20px 0;">
          <h1 style="font-size: 28px;">Certificate of Completion</h1>
          <p>This is to certify that</p>
          <h2 style="font-size: 26px; color: #00d4ff;">${userName}</h2>
          <p>has successfully completed the</p>
          <h3 style="font-size: 22px;">${company.name} – ${jobRole}</h3>
          <p>job simulation with a perfect score.</p>
          <p>Date: ${completionDate}</p>
          <p>Verification Code: ${verificationCode}</p>
          <p>Verify at: <a href="${verificationUrl}" target="_blank">${verificationUrl}</a></p>
          <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
            <p>Nnadi Daniel</p>
            <p><em>Founder, ArmorAI</em></p>
            <p>✍️ Digitally Signed</p>
          </div>
        </div>
      </div>
    `;
    document.getElementById('certificateContent').innerHTML = certHtml;
    document.getElementById('quizModal').style.display = 'none';
    document.getElementById('certificateModal').style.display = 'flex';
    window.currentCertUrl = verificationUrl;
  }

  document.getElementById('downloadPdf').onclick = () => {
    const element = document.getElementById('certificateToPrint');
    html2pdf().from(element).save();
  };
  document.getElementById('shareLinkedIn').onclick = () => {
    const url = encodeURIComponent(window.currentCertUrl || window.location.href);
    const title = encodeURIComponent('ArmorAI Certification');
    const summary = encodeURIComponent(`I earned a certification in ${currentQuiz.domain} from ${companies.find(c => c.id === currentQuiz.companyId).name}!`);
    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}&title=${title}&summary=${summary}`, '_blank');
  };
  document.getElementById('closeCertModal').onclick = () => {
    document.getElementById('certificateModal').style.display = 'none';
  };

  loadCompanies();
</script>
</body>
</html>
